{% extends 'base.html' %}

{% block title %}Edit {{ filename }} — CthulhuBot{% endblock %}

{% block content %}
<div class="mb-4">
    <div class="label">Archive Editor</div>
    <h2 class="serif" style="fontSize:32px; margin:8px 0 0">Editing: <code>{{ filename }}</code></h2>
</div>

<div class="card-h mb-4">
    <window.Corners/>
    <div class="card-header d-flex justify-content-between align-items-center py-3">
        <div class="serif" style="font-size:18px">
            <span style="color:var(--sigil); margin-right:8px">✎</span> Content Scroll
        </div>
        <div class="d-flex align-items-center gap-3">
            <span id="typeInfo" class="mono" style="font-size:10px; color:var(--bone-fade)"></span>
            <button class="btn-eld on" id="toggleViewBtn" style="display: none; padding: 6px 12px; font-size: 9px">
                SWITCH TO VISUAL RITUAL
            </button>
        </div>
    </div>
    <div class="card-body p-4">
        <div class="alert alert-success d-none mb-4" id="saveMessage" style="background:rgba(120,220,170,0.1); border-color:var(--sigil); color:var(--sigil); font-family:var(--font-mono); font-size:12px">The knowledge has been sealed.</div>
        <div class="alert alert-danger d-none mb-4" id="errorMessage" style="background:rgba(180,70,60,0.1); border-color:var(--rust); color:var(--rust); font-family:var(--font-mono); font-size:12px">An error occurred while communing with the disk.</div>

        <!-- Raw Editor -->
        <div id="rawEditorContainer">
            <textarea class="form-control bg-dark text-light border-secondary mono" id="jsonContent" rows="20" style="font-size:13px; line-height:1.5; color:var(--sigil) !important">{{ content }}</textarea>
        </div>

        <!-- Visual Editor -->
        <div class="d-none" id="visualEditorContainer">
            <div class="responsive-table-container border border-secondary mb-3" style="max-height: 600px; overflow-y: auto;">
                <table class="table table-dark mb-0" id="visualTable">
                    <thead class="sticky-top bg-dark">
                        <tr id="visualTheadRow">
                            <!-- Headers injected by JS -->
                        </tr>
                    </thead>
                    <tbody id="visualTbody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
            <div class="mt-2">
                <button class="btn-eld on" id="addRowBtn" style="padding: 6px 12px; font-size: 10px">
                    ✚ ADD ROW
                </button>
            </div>
        </div>
    </div>
    <div class="card-footer p-4 border-top border-secondary d-flex gap-3">
        <button class="btn-eld primary" id="saveBtn">SEAL CHANGES</button>
        <a href="/admin/browse/{{ folder }}" class="btn-eld">CANCEL</a>
    </div>
</div>

<script>
    // State
    let currentMode = 'raw'; // 'raw' | 'visual'
    let structureType = null; // 'list' | 'dict' | 'complex'

    // Elements
    const rawContainer = document.getElementById('rawEditorContainer');
    const visualContainer = document.getElementById('visualEditorContainer');
    const textarea = document.getElementById('jsonContent');
    const toggleBtn = document.getElementById('toggleViewBtn');
    const typeInfo = document.getElementById('typeInfo');
    const tbody = document.getElementById('visualTbody');
    const theadRow = document.getElementById('visualTheadRow');

    // Init
    document.addEventListener('DOMContentLoaded', () => {
        checkStructure();
    });

    toggleBtn.addEventListener('click', () => {
        if (currentMode === 'raw') {
            switchToVisual();
        } else {
            switchToRaw();
        }
    });

    document.getElementById('addRowBtn').addEventListener('click', addRow);

    function checkStructure() {
        try {
            const content = textarea.value;
            const data = JSON.parse(content);

            if (Array.isArray(data)) {
                // Check if simple list of strings
                const isSimple = data.every(item => typeof item === 'string');
                if (isSimple) {
                    structureType = 'list';
                    toggleBtn.style.display = 'inline-block';
                    typeInfo.textContent = "LIST DETECTED";
                } else {
                    structureType = 'complex';
                    typeInfo.textContent = "COMPLEX LIST (VISUAL DISABLED)";
                }
            } else if (typeof data === 'object' && data !== null) {
                // Check if simple dict of strings
                const values = Object.values(data);
                const isSimple = values.every(item => typeof item === 'string');
                if (isSimple) {
                    structureType = 'dict';
                    toggleBtn.style.display = 'inline-block';
                    typeInfo.textContent = "DICTIONARY DETECTED";
                } else {
                    structureType = 'complex';
                    typeInfo.textContent = "COMPLEX OBJECT (VISUAL DISABLED)";
                }
            } else {
                structureType = 'complex';
            }
        } catch (e) {
            // Invalid JSON, keep button hidden
            console.error("Initial JSON parse error:", e);
        }
    }

    function switchToVisual() {
        try {
            const data = JSON.parse(textarea.value);
            renderTable(data);

            rawContainer.classList.add('d-none');
            visualContainer.classList.remove('d-none');
            toggleBtn.textContent = "SWITCH TO RAW SCROLL";
            currentMode = 'visual';
        } catch (e) {
            alert("Cannot switch to Visual Editor: Invalid JSON in Raw view.");
        }
    }

    function switchToRaw() {
        updateRawFromVisual();

        visualContainer.classList.add('d-none');
        rawContainer.classList.remove('d-none');
        toggleBtn.textContent = "SWITCH TO VISUAL RITUAL";
        currentMode = 'raw';
    }

    function renderTable(data) {
        tbody.innerHTML = '';
        theadRow.innerHTML = '';

        if (structureType === 'list') {
            theadRow.innerHTML = '<th class="label ps-3 py-2">Value</th><th class="label text-center py-2" style="width: 80px">Action</th>';
            data.forEach(val => addRowHTML(null, val));
        } else if (structureType === 'dict') {
            theadRow.innerHTML = '<th class="label ps-3 py-2" style="width: 30%">Key</th><th class="label py-2">Value</th><th class="label text-center py-2" style="width: 80px">Action</th>';
            const keys = Object.keys(data).sort();
            keys.forEach(key => addRowHTML(key, data[key]));
        }
    }

    function addRowHTML(key, val) {
        const tr = document.createElement('tr');
        tr.className = 'border-secondary';

        let html = '';
        if (structureType === 'dict') {
            const safeKey = key ? key.replace(/"/g, '&quot;') : '';
            const safeVal = val ? val.replace(/"/g, '&quot;') : '';
            html += `
                <td class="ps-3"><input type="text" class="form-control bg-dark text-light border-secondary mono" value="${safeKey}" placeholder="Key" style="font-size:12px"></td>
                <td><input type="text" class="form-control bg-dark text-light border-secondary mono" value="${safeVal}" placeholder="Value" style="font-size:12px"></td>
            `;
        } else {
            const safeVal = val ? val.replace(/"/g, '&quot;') : '';
            html += `
                <td class="ps-3"><input type="text" class="form-control bg-dark text-light border-secondary mono" value="${safeVal}" placeholder="Value" style="font-size:12px"></td>
            `;
        }

        html += `
            <td class="text-center">
                <button class="btn-eld rust delete-row" title="Banish Row" style="border:0; padding:4px 8px">✕</button>
            </td>
        `;

        tr.innerHTML = html;
        tbody.appendChild(tr);

        tr.querySelector('.delete-row').addEventListener('click', () => {
            tr.remove();
        });
    }

    function addRow() {
        addRowHTML('', '');
        const rows = tbody.querySelectorAll('tr');
        const lastRow = rows[rows.length - 1];
        const firstInput = lastRow.querySelector('input');
        if (firstInput) firstInput.focus();
    }

    function updateRawFromVisual() {
        if (structureType === 'list') {
            const inputs = tbody.querySelectorAll('input');
            const arr = Array.from(inputs).map(input => input.value);
            textarea.value = JSON.stringify(arr, null, 4);
        } else if (structureType === 'dict') {
            const obj = {};
            const rows = tbody.querySelectorAll('tr');
            rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs.length === 2) {
                    const key = inputs[0].value;
                    const val = inputs[1].value;
                    if (key) obj[key] = val;
                }
            });
            textarea.value = JSON.stringify(obj, null, 4);
        }
    }

    // Save Handling
    document.getElementById('saveBtn').addEventListener('click', async () => {
        const btn = document.getElementById('saveBtn');
        const saveMsg = document.getElementById('saveMessage');
        const errorMsg = document.getElementById('errorMessage');

        if (currentMode === 'visual') {
            updateRawFromVisual();
        }

        const content = textarea.value;

        btn.disabled = true;
        btn.innerText = "SEALING...";
        saveMsg.classList.add('d-none');
        errorMsg.classList.add('d-none');

        try {
            JSON.parse(content);
        } catch (e) {
            errorMsg.textContent = "CORRUPTED KNOWLEDGE (Invalid JSON): " + e.message;
            errorMsg.classList.remove('d-none');
            btn.disabled = false;
            btn.innerText = "SEAL CHANGES";
            return;
        }

        try {
            const response = await fetch('/api/save/{{ folder }}/{{ filename }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ content: content })
            });

            const result = await response.json();
            if (response.ok) {
                saveMsg.classList.remove('d-none');
                checkStructure();
                setTimeout(() => saveMsg.classList.add('d-none'), 3000);
            } else {
                errorMsg.textContent = "RITUAL FAILED: " + result.message;
                errorMsg.classList.remove('d-none');
            }
        } catch (e) {
            errorMsg.textContent = "VOID CONNECTION ERROR: " + e.message;
            errorMsg.classList.remove('d-none');
        } finally {
            btn.disabled = false;
            btn.innerText = "SEAL CHANGES";
        }
    });
</script>
{% endblock %}
