<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-theme="{{ dashboard_theme|default('cthulhu') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morse Code — CthulhuBot</title>
    <link href="{{ url_for('static', filename='css/themes.css') }}" rel="stylesheet">
    {% include 'includes/font_styles.html' %}
    <style>
        {% if font_filename %}
        @font-face {
            font-family: 'CustomScript';
            src: url("{{ url_for('serve_fonts', filename=font_filename) }}");
        }
        {% endif %}

        body {
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            -webkit-font-smoothing: antialiased;
        }

        .morse-container {
            padding: 50px;
            max-width: 900px;
            text-align: left;
            background-color: white;
            border: 1px solid #eee;
        }

        .morse-text {
            {% if font_filename %}
            font-family: 'CustomScript', serif;
            {% else %}
            font-family: var(--font-mono, monospace);
            {% endif %}
            font-size: 2.2rem;
            color: black;
            line-height: 1.8;
            word-wrap: break-word;
            white-space: pre-wrap;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="morse-container">
        <div class="morse-text">{{ text }}</div>
    </div>
</body>
</html>
