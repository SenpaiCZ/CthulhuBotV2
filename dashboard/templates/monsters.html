{% extends 'base.html' %}

{% block title %}Monsters - Grimoire{% endblock %}

{% block extra_head %}
<style>
  .layout{display:flex;flex:1;min-height:0}
  .sidebar{flex:0 0 260px;display:flex;flex-direction:column;border-right:1px solid var(--hair-strong);background:linear-gradient(180deg,var(--void-1),var(--void-0))}
  .sidebar-header{padding:12px 16px;border-bottom:1px solid var(--hair-strong);font-weight:600;color:var(--sigil);font-size:12px;letter-spacing:0.08em}
  .sidebar-search{padding:10px}
  .sidebar-search input{width:100%;padding:7px 10px;border:1px solid var(--hair-strong);background:var(--void-2);color:var(--bone);font-size:12px}
  .sidebar-list{flex:1;overflow-y:auto}
  .sidebar-item{padding:8px 12px;border:none;background:transparent;color:var(--bone-fade);text-align:left;cursor:pointer;border-left:3px solid transparent;transition:all 0.2s;font-size:13px;width:100%}
  .sidebar-item:hover{background:rgba(190,210,195,0.05);color:var(--bone)}
  .sidebar-item.active{background:rgba(190,210,195,0.08);border-left-color:var(--sigil);color:var(--sigil)}

  .detail-panel{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:28px 40px 80px}
  .placeholder{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;text-align:center}
  .placeholder-title{font-size:24px;color:var(--bone-fade);opacity:0.3}

  .monster-title{font-size:32px;color:var(--sigil);margin-bottom:4px;font-family:"IM Fell English",serif}
  .section-title{color:var(--bone);font-size:14px;font-weight:600;margin:16px 0 8px 0;padding-bottom:8px;border-bottom:1px solid var(--hair-strong)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-bottom:12px}
  .stat-box{border:1px solid var(--hair-strong);background:var(--void-2);padding:8px;text-align:center}
  .stat-label{font-size:10px;color:var(--bone-fade)}
  .stat-value{font-size:14px;color:var(--bone);font-weight:600}
  .card{border:1px solid var(--hair-strong);background:var(--void-2);padding:12px;margin-bottom:12px}
  .badge{display:inline-block;padding:3px 6px;background:var(--void-3);color:var(--bone-fade);font-size:10px;margin:0 3px 3px 0}
</style>
{% endblock %}

{% block content %}
<div id="root" style="height: calc(100vh - 60px); margin-top: 60px;"></div>
{% endblock %}

{% block scripts %}
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='sidebar.jsx') }}"></script>
<script type="text/babel" data-presets="react">
const MONSTERS_DATA = {{ data | tojson }};
const STAT_EMOJIS = {{ stat_emojis | tojson }};

{% raw %}
const AppSidebar = () => { const C = window.AppSidebar; return C ? React.createElement(C) : null; };

function MonsterDetail({monster, statEmojis}) {
  const [showRaw, setShowRaw] = React.useState(false);
  
  React.useEffect(() => {
    if (monster) {
      const name = monster.monster_entry?.name || monster.name;
      if (window.initImageControl) {
        window.initImageControl('image-container', 'monster', name);
      }
    }
  }, [monster]);

  if (!monster) {
    return (
      <div className="placeholder">
        <div className="placeholder-title">Select a creature</div>
      </div>
    );
  }
  const m = monster.monster_entry;
  
  // Helper to format characteristics with emojis
  const renderStat = (key, val) => {
    const emojiStr = STAT_EMOJIS[key] || '';
    let valStr = typeof val === 'object' ? (val.average || val.value || val) : val;
    let rollStr = typeof val === 'object' ? val.roll : null;
    
    return (
      <div key={key} className="stat-box">
        <div className="stat-label">{emojiStr} {key}</div>
        <div className="stat-value">{valStr}</div>
        {rollStr && <div className="stat-label" style={{fontSize: '9px', opacity: 0.7}}>{rollStr}</div>}
      </div>
    );
  };

  return (
    <div style={{position:'relative'}}>
      <button 
        onClick={() => setShowRaw(!showRaw)}
        style={{position:'absolute', right:0, top:-20, fontSize:'9px', background:'none', border:'1px solid var(--hair)', color:'var(--bone-fade)', padding:'2px 5px'}}
      >
        {showRaw ? 'SHOW UI' : 'VIEW RAW'}
      </button>

      {showRaw ? (
        <pre style={{fontSize:'11px', color:'var(--sigil)', background:'var(--void-1)', padding:'15px', border:'1px solid var(--hair)', overflowX:'auto'}}>
          {JSON.stringify(m, null, 2)}
        </pre>
      ) : (
        <>
          <div style={{display:'flex', gap:24, alignItems:'flex-start', marginBottom:20}}>
            <div style={{flex:1}}>
              <h1 className="monster-title" style={{fontSize:'42px', margin:0}}>{m.name}</h1>
              {m.subtitle && <div style={{color:"var(--bone-fade)", fontStyle:"italic", fontSize:'18px', marginBottom:8}}>{m.subtitle}</div>}
              <div style={{display:'flex', flexWrap:'wrap', gap:4, marginBottom:10}}>
                {m.tags && m.tags.map(tag => <span key={tag} className="badge" style={{background:'var(--sigil-deep)', color:'white'}}>{tag}</span>)}
              </div>
              {m.alternative_names && m.alternative_names.length > 0 && (
                <div style={{fontSize:'13px', color:'var(--bone-fade)', marginBottom:10}}>
                  <strong style={{color:'var(--bone)'}}>Also known as:</strong> {m.alternative_names.join(', ')}
                </div>
              )}
            </div>
            
            <div id="image-container" style={{width: 280, flexShrink: 0}}>
               {/* Image will be injected here by useEffect */}
            </div>
          </div>

          <div className="card" style={{borderLeft: '4px solid var(--sigil)', background:'rgba(120,220,170,0.03)'}}>
             {m.description}
          </div>
          
          {m.main_entry_text && m.main_entry_text !== m.description && (
            <div className="card" style={{fontSize:'13px', opacity:0.8, fontStyle:'italic'}}>
              {m.main_entry_text}
            </div>
          )}

          <div className="section-title">Characteristics</div>
          <div className="stat-grid">
            {Object.entries(m.characteristics || {}).map(([key, val]) => renderStat(key, val))}
          </div>

          <div className="section-title">Derived Stats</div>
          <div className="stat-grid" style={{gridTemplateColumns:'repeat(5, 1fr)'}}>
            <div className="stat-box">
              <div className="stat-label">{STAT_EMOJIS['HP']} HP</div>
              <div className="stat-value" style={{color:'var(--rust)'}}>{m.derived_stats?.hit_points}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">{STAT_EMOJIS['DB']} DB</div>
              <div className="stat-value">{m.derived_stats?.damage_bonus}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">{STAT_EMOJIS['Build']} Build</div>
              <div className="stat-value">{m.derived_stats?.build}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">{STAT_EMOJIS['MP']} MP</div>
              <div className="stat-value" style={{color:'var(--sigil)'}}>{m.derived_stats?.magic_points}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">{STAT_EMOJIS['Move']} Move</div>
              <div className="stat-value">
                {typeof m.derived_stats?.move === 'object' ? m.derived_stats.move.base : m.derived_stats?.move}
                {m.derived_stats?.move?.special && <div style={{fontSize:'9px', color:'var(--bone-fade)'}}>{m.derived_stats.move.special}</div>}
              </div>
            </div>
          </div>

          <div className="row" style={{display:'flex', gap:20, marginTop:10}}>
            <div style={{flex:1}}>
              <div className="section-title">Combat</div>
              <div className="card" style={{padding:0, overflow:'hidden'}}>
                <div style={{padding:'10px 15px', background:'var(--void-3)', borderBottom:'1px solid var(--hair)', fontSize:'13px'}}>
                  <strong>Attacks per round:</strong> {m.combat?.attacks_per_round}
                </div>
                {m.combat?.attacks?.map((atk, i) => (
                  <div key={i} style={{padding:'12px 15px', borderBottom: i < m.combat.attacks.length-1 ? '1px solid var(--hair)' : 'none'}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                      <div>
                        <div style={{color:'var(--sigil)', fontWeight:'bold', fontSize:'15px'}}>{atk.name}</div>
                        <div style={{fontSize:'13px', color:'var(--rust)', fontWeight:'bold', marginTop:2}}>Damage: {atk.damage}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div className="mono" style={{fontSize:'16px', color:'var(--sigil)'}}>{atk.success_chance}</div>
                        {(atk.difficulty_hard || atk.difficulty_extreme) && (
                          <div style={{fontSize:'10px', color:'var(--bone-fade)'}}>
                            H: {atk.difficulty_hard} | E: {atk.difficulty_extreme}
                          </div>
                        )}
                      </div>
                    </div>
                    {atk.special_effect && <div style={{fontSize:'12px', fontStyle:'italic', color:'var(--bone-fade)', marginTop:4}}>Effect: {atk.special_effect}</div>}
                    {atk.description && <div style={{fontSize:'12px', color:'var(--bone-dim)', marginTop:4}}>{atk.description}</div>}
                  </div>
                ))}
                <div style={{padding:'10px 15px', background:'var(--void-3)', borderTop:'1px solid var(--hair)', display:'flex', justifyContent:'space-between', fontSize:'13px'}}>
                   <strong>Dodge:</strong>
                   <span className="mono">
                     {m.combat?.dodge?.success_chance || 'N/A'}
                     {m.combat?.dodge?.difficulty_hard && ` (H: ${m.combat.dodge.difficulty_hard}, E: ${m.combat.dodge.difficulty_extreme})`}
                   </span>
                </div>
              </div>
            </div>

            <div style={{width:300, flexShrink:0}}>
              <div className="section-title">Defenses & Magic</div>
              <div className="card">
                <div style={{marginBottom:10}}>
                  <div className="stat-label">Armor</div>
                  <div style={{fontSize:'15px', fontWeight:'bold'}}>{m.armor?.rating || 'None'}</div>
                  {m.armor?.modifiers && <div style={{fontSize:'12px', color:'var(--bone-fade)', marginTop:2}}>{m.armor.modifiers}</div>}
                </div>
                <div style={{marginBottom:10, padding:'8px 0', borderTop:'1px solid var(--hair)'}}>
                  <div className="stat-label">Spells</div>
                  <div style={{fontSize:'13px'}}>{m.spells || 'None'}</div>
                </div>
                <div style={{paddingTop:8, borderTop:'1px solid var(--hair)'}}>
                  <div className="stat-label">Sanity Loss</div>
                  <div style={{fontSize:'14px', color:'var(--rust)', fontWeight:'bold'}}>{m.sanity_loss || 'None'}</div>
                </div>
              </div>

              <div className="section-title">Skills</div>
              <div className="card" style={{display:'flex', flexWrap:'wrap', gap:6, padding:'10px'}}>
                {m.skills?.map((s, i) => (
                  <div key={i} style={{fontSize:'12px', background:'var(--void-4)', padding:'4px 8px', border:'1px solid var(--hair-strong)'}}>
                    {s.name} <span style={{color:'var(--sigil)', fontWeight:'bold'}}>{s.value}</span>
                  </div>
                ))}
                {(!m.skills || m.skills.length === 0) && <span style={{color:'var(--bone-fade)', fontSize:'12px'}}>None listed.</span>}
              </div>
            </div>
          </div>

          {m.powers_and_abilities && m.powers_and_abilities.length > 0 && (
            <>
              <div className="section-title">Powers & Abilities</div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:15}}>
                {m.powers_and_abilities.map((p, i) => (
                  <div key={i} className="card" style={{margin:0}}>
                    <div style={{color:'var(--sigil)', fontWeight:'bold', marginBottom:4}}>{p.name}</div>
                    <div style={{fontSize:'13px', lineHeight:1.5, color:'var(--bone-dim)'}}>{p.description}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </>
      )}
    </div>
  );
}

function App({monstersData, statEmojis}) {
  const [search, setSearch] = React.useState('');
  const [selected, setSelected] = React.useState(null);
  const data = Array.isArray(monstersData) ? monstersData : monstersData.monsters || [];
  const filtered = data.filter(m => {
    const name = m.monster_entry?.name || m.name || '';
    return name.toLowerCase().includes(search.toLowerCase());
  });

  return (
    <div className="layout">
      <div className="sidebar">
        <div className="sidebar-header">Grimoire</div>
        <div className="sidebar-search">
          <input type="text" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div className="sidebar-list">
          {filtered.length > 0 ? (
            filtered.map(m => {
              const name = m.monster_entry?.name || m.name || 'Unknown';
              const isActive = selected?.monster_entry?.name === name || selected?.name === name;
              return (
                <button key={name} className={`sidebar-item ${isActive ? 'active' : ''}`} onClick={() => setSelected(m)}>
                  {name}
                </button>
              );
            })
          ) : (
            <div style={{padding:12,textAlign:"center",color:"var(--bone-fade)",fontSize:12}}>No creatures found.</div>
          )}
        </div>
      </div>
      <div className="detail-panel" id="detailPanel" style={{flex:1, overflowY:'auto', padding:'20px'}}>
        <MonsterDetail monster={selected} statEmojis={statEmojis}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App monstersData={MONSTERS_DATA} statEmojis={STAT_EMOJIS}/>);
{% endraw %}
</script>
{% endblock %}
