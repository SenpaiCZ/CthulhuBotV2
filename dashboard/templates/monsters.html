{% extends 'base.html' %}

{% block title %}Monsters — Grimoire{% endblock %}

{% block content %}
<div id="monsters-root"></div>
{% endblock %}

{% block scripts %}
<script type="text/babel" data-presets="react">
const MONSTERS_DATA = {{ data | tojson }};
const STAT_EMOJIS = {{ stat_emojis | tojson }};

{% raw %}
const { useState, useMemo, useEffect } = React;

function MonsterDetail({monster, statEmojis}) {
  const [showRaw, setShowRaw] = useState(false);
  const [imageUrl, setImageUrl] = useState(null);
  
  useEffect(() => {
    if (monster) {
      const name = monster.monster_entry?.name || monster.name;
      fetch(`/api/images/check?type_slug=monster&name=${encodeURIComponent(name)}`)
        .then(r => r.json())
        .then(data => {
          if (data.found) setImageUrl(data.url + '?t=' + new Date().getTime());
          else setImageUrl(null);
        })
        .catch(() => setImageUrl(null));
    }
  }, [monster]);

  if (!monster) {
    return (
      <div style={{display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", height:"100%", textAlign:"center", opacity:0.3, minHeight:400}}>
        <div className="serif" style={{fontSize:28, color:"var(--bone-fade)"}}>Select a creature from the archives</div>
      </div>
    );
  }
  const m = monster.monster_entry;
  
  const renderStat = (key, val) => {
    const symbolStr = statEmojis[key] || statEmojis['Default'] || '✶';
    let valStr = typeof val === 'object' ? (val.average || val.value || val) : val;
    let rollStr = typeof val === 'object' ? val.roll : null;
    
    return (
      <div key={key} className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
        <window.Corners/>
        <div style={{fontSize:10, color:"var(--sigil)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>{symbolStr} {key}</div>
        <div style={{fontSize:18, color:"var(--bone)", fontWeight:600}}>{valStr}</div>
        {rollStr && <div style={{fontSize:9, opacity:0.6, marginTop:2, color:"var(--bone-fade)"}}>{rollStr}</div>}
      </div>
    );
  };

  return (
    <div style={{position:'relative'}}>
      <div style={{display:'flex', justifyContent:'flex-end', marginBottom:20}}>
          <button 
            onClick={() => setShowRaw(!showRaw)}
            className="btn-eld" style={{fontSize:9, padding:"4px 8px"}}
          >
            {showRaw ? 'SHOW INTERFACE' : 'VIEW RAW DATA'}
          </button>
      </div>

      {showRaw ? (
        <pre style={{fontFamily:"var(--font-mono)", fontSize:11, color:"var(--sigil)", background:"var(--void-1)", padding:20, border:"1px solid var(--hair)", overflowX:"auto"}}>
          {JSON.stringify(m, null, 2)}
        </pre>
      ) : (
        <>
          <div style={{display:'flex', gap:40, alignItems:'flex-start', marginBottom:30, flexWrap:'wrap'}}>
            <div style={{flex:1, minWidth:300}}>
              <div className="label" style={{color:"var(--sigil)"}}>Mythos Entity</div>
              <h1 className="serif" style={{fontSize:48, color:"var(--sigil)", margin:"8px 0"}}>{m.name}</h1>
              {m.subtitle && <div className="serif-i" style={{color:"var(--bone-fade)", fontSize:20, marginBottom:16}}>{m.subtitle}</div>}
              <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:16}}>
                {m.tags && m.tags.map(tag => <span key={tag} className="badge bg-dark border border-secondary" style={{fontSize:10, borderRadius:0, padding:"4px 8px"}}>{tag.toUpperCase()}</span>)}
              </div>
            </div>
            
            {imageUrl && (
              <div style={{maxWidth: 400, flex: "1 0 300px"}}>
                <img src={imageUrl} alt={m.name} style={{width:'100%', border:'1px solid var(--hair-strong)', boxShadow:'0 10px 30px rgba(0,0,0,0.5)'}} />
              </div>
            )}
          </div>

          <div className="card-h p-4 mb-4" style={{borderLeft: '4px solid var(--sigil)', fontSize:'16px', lineHeight:1.6}}>
             <window.Corners/>
             {m.description}
          </div>

          <div className="label mb-3" style={{color:"var(--sigil)"}}>Characteristics</div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(100px, 1fr))", gap:10, marginBottom:32}}>
            {Object.entries(m.characteristics || {}).map(([key, val]) => renderStat(key, val))}
          </div>

          <div className="label mb-3" style={{color:"var(--sigil)"}}>Derived Attributes</div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(100px, 1fr))", gap:10, marginBottom:32}}>
            <div className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
              <window.Corners/>
              <div style={{fontSize:10, color:"var(--rust)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>❣ HP</div>
              <div style={{fontSize:18, color:"var(--rust)", fontWeight:600}}>{m.derived_stats?.hit_points}</div>
            </div>
            <div className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
              <window.Corners/>
              <div style={{fontSize:10, color:"var(--sigil)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>⚔ DB</div>
              <div style={{fontSize:18, color:"var(--bone)", fontWeight:600}}>{m.derived_stats?.damage_bonus}</div>
            </div>
            <div className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
              <window.Corners/>
              <div style={{fontSize:10, color:"var(--sigil)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>✶ Build</div>
              <div style={{fontSize:18, color:"var(--bone)", fontWeight:600}}>{m.derived_stats?.build}</div>
            </div>
            <div className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
              <window.Corners/>
              <div style={{fontSize:10, color:"var(--sigil)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>✧ MP</div>
              <div style={{fontSize:18, color:"var(--sigil)", fontWeight:600}}>{m.derived_stats?.magic_points}</div>
            </div>
            <div className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
              <window.Corners/>
              <div style={{fontSize:10, color:"var(--sigil)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>✶ Move</div>
              <div style={{fontSize:18, color:"var(--bone)", fontWeight:600}}>
                {typeof m.derived_stats?.move === 'object' ? m.derived_stats.move.base : m.derived_stats?.move}
              </div>
            </div>
          </div>

          <div className="row g-4 mt-2">
            <div className="col-lg-7">
              <div className="label mb-3" style={{color:"var(--sigil)"}}>Combat Capabilities</div>
              <div className="card-h p-0 overflow-hidden">
                <window.Corners/>
                <div style={{padding:'12px 20px', background:'var(--void-4)', borderBottom:'1px solid var(--hair)', fontSize:'12px', color:"var(--bone-fade)"}}>
                  <strong>ATTACKS PER ROUND:</strong> {m.combat?.attacks_per_round}
                </div>
                {m.combat?.attacks?.map((atk, i) => (
                  <div key={i} style={{padding:'20px', borderBottom: i < m.combat.attacks.length-1 ? '1px solid var(--hair)' : 'none'}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
                      <div>
                        <div className="serif" style={{color:'var(--sigil)', fontSize:'18px'}}>{atk.name}</div>
                        <div className="mono" style={{fontSize:'12px', color:'var(--rust)', marginTop:4}}>DAMAGE: {atk.damage}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div className="mono" style={{fontSize:'20px', color:'var(--sigil)', lineHeight:1}}>{atk.success_chance}%</div>
                      </div>
                    </div>
                    {atk.description && <div style={{fontSize:'13px', color:'var(--bone-dim)', lineHeight:1.5}}>{atk.description}</div>}
                  </div>
                ))}
                <div style={{padding:'12px 20px', background:'var(--void-4)', borderTop:'1px solid var(--hair)', display:'flex', justifyContent:'space-between', fontSize:'12px'}}>
                   <strong className="label">DODGE</strong>
                   <span className="mono" style={{color:"var(--sigil)"}}>{m.combat?.dodge?.success_chance}%</span>
                </div>
              </div>
            </div>

            <div className="col-lg-5">
              <div className="label mb-3" style={{color:"var(--sigil)"}}>Defenses & Arcana</div>
              <div className="card-h p-4 mb-4">
                <window.Corners/>
                <div style={{marginBottom:20}}>
                  <div className="label" style={{fontSize:9, marginBottom:6}}>ARMOR</div>
                  <div style={{fontSize:'16px', fontWeight:'bold', color:"var(--bone)"}}>{m.armor?.rating || 'None'}</div>
                  {m.armor?.modifiers && <div className="serif-i" style={{fontSize:'13px', color:'var(--bone-fade)', marginTop:4}}>{m.armor.modifiers}</div>}
                </div>
                <div style={{marginBottom:20, paddingTop:16, borderTop:'1px solid var(--hair)'}}>
                  <div className="label" style={{fontSize:9, marginBottom:6}}>SPELLS</div>
                  <div style={{fontSize:'14px', lineHeight:1.5, color:"var(--bone-dim)"}}>{m.spells || 'None'}</div>
                </div>
                <div style={{paddingTop:16, borderTop:'1px solid var(--hair)'}}>
                  <div className="label" style={{fontSize:9, marginBottom:6}}>SANITY LOSS</div>
                  <div className="serif" style={{fontSize:'20px', color:'var(--rust)'}}>{m.sanity_loss || 'None'}</div>
                </div>
              </div>

              <div className="label mb-3" style={{color:"var(--sigil)"}}>Skills</div>
              <div className="card-h p-3 d-flex flex-wrap gap-2">
                <window.Corners/>
                {m.skills?.map((s, i) => (
                  <div key={i} style={{fontSize:'12px', background:'var(--void-2)', padding:'6px 12px', border:'1px solid var(--hair-strong)', color:"var(--bone-dim)"}}>
                    {s.name} <span style={{color:'var(--sigil)', marginLeft:4}}>{s.value}</span>
                  </div>
                ))}
                {(!m.skills || m.skills.length === 0) && <div className="serif-i text-muted w-100 text-center py-2">No skills recorded.</div>}
              </div>
            </div>
          </div>

          {m.powers_and_abilities && m.powers_and_abilities.length > 0 && (
            <div className="mt-5">
              <div className="label mb-3" style={{color:"var(--sigil)"}}>Special Powers & Abilities</div>
              <div className="row g-4">
                {m.powers_and_abilities.map((p, i) => (
                  <div key={i} className="col-md-6">
                    <div className="card-h p-4 h-100" style={{borderTop:'2px solid var(--sigil)'}}>
                      <window.Corners/>
                      <div className="serif" style={{color:'var(--sigil)', marginBottom:10, fontSize:'18px'}}>{p.name}</div>
                      <div style={{fontSize:'14px', lineHeight:1.6, color:'var(--bone-dim)'}}>{p.description}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function MonstersApp() {
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  
  const data = useMemo(() => {
    return Array.isArray(MONSTERS_DATA) ? MONSTERS_DATA : MONSTERS_DATA.monsters || [];
  }, []);

  const filtered = useMemo(() => {
    return data.filter(m => {
      const name = m.monster_entry?.name || m.name || '';
      return name.toLowerCase().includes(search.toLowerCase());
    });
  }, [data, search]);

  return (
    <div className="row g-0" style={{margin:"-2rem -3rem", height:"calc(100vh - 72px)"}}>
      <div className="col-md-3 h-100 d-flex flex-column border-end border-secondary" style={{background:"var(--void-1)"}}>
        <div className="p-4 border-bottom border-secondary">
          <div className="label mb-3">Bestiary Explorer</div>
          <div className="input-group">
             <span className="input-group-text bg-dark border-secondary text-muted" style={{borderRight:0}}>⌕</span>
             <input type="text" className="form-control bg-dark text-light border-secondary" placeholder="Search creatures…" value={search} onChange={e => setSearch(e.target.value)} style={{fontSize:13, borderLeft:0}} />
          </div>
        </div>
        <div style={{flex:1, overflowY:"auto"}}>
            {filtered.length > 0 ? (
                filtered.map((m, i) => {
                    const name = m.monster_entry?.name || m.name || 'Unknown';
                    const isActive = selected?.monster_entry?.name === name || selected?.name === name;
                    return (
                        <button key={i} 
                            onClick={() => setSelected(m)}
                            className="w-100 border-0 text-start py-3 px-4 transition-all"
                            style={{
                                background: isActive ? "rgba(120,220,170,0.08)" : "transparent",
                                color: isActive ? "var(--sigil)" : "var(--bone-dim)",
                                borderLeft: isActive ? "3px solid var(--sigil)" : "3px solid transparent",
                                fontSize: 14,
                                borderBottom: "1px solid var(--hair)"
                            }}
                        >
                            {name}
                        </button>
                    );
                })
            ) : (
                <div className="p-5 text-center serif-i text-muted">No entities found.</div>
            )}
        </div>
      </div>
      <div className="col-md-9 h-100" style={{overflowY:"auto", padding:"40px 60px 100px"}}>
         <MonsterDetail monster={selected} statEmojis={STAT_EMOJIS}/>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('monsters-root'));
root.render(<MonstersApp />);
{% endraw %}
</script>
{% endblock %}
