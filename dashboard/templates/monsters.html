<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monsters - CoC Bot</title>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    {% include 'includes/font_styles.html' %}

    <style>
      :root {
        --void-0: #0a0a0a;
        --void-1: #141414;
        --void-2: #1e1e1e;
        --hair: #2a2a2a;
        --hair-strong: #3a3a3a;
        --bone: #d4d4d4;
        --bone-fade: #888888;
        --sigil: #8b7355;
        --sigil-g: rgba(139, 115, 85, 0.3);
        --rust: #b85c3c;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        background: var(--void-0);
        color: var(--bone);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }

      .serif { font-family: "Libre Baskerville", serif; }
      .mono { font-family: "IBM Plex Mono", monospace; }

      @keyframes flicker {
        0%, 18%, 22%, 25%, 54%, 56%, 100% { opacity: 1; }
        20%, 24%, 55% { opacity: 0.8; }
      }
      .flicker { animation: flicker 7s infinite; }

      #root { display: flex; height: 100vh; overflow: hidden; }

      header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 32px;
        border-bottom: 1px solid var(--hair);
        background: linear-gradient(180deg, var(--void-0), transparent);
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(6px);
      }

      .layout { display: flex; flex: 1; min-height: 0; }

      .sidebar {
        flex: 0 0 260px;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--hair);
        overflow: hidden;
      }

      .sidebar-header {
        padding: 12px;
        border-bottom: 1px solid var(--hair);
        font-weight: 600;
        color: var(--sigil);
      }

      .sidebar-search {
        padding: 8px;
        border-bottom: 1px solid var(--hair);
      }

      .sidebar-search input {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid var(--hair);
        background: var(--void-2);
        color: var(--bone);
        font-size: 12px;
      }

      .sidebar-list {
        flex: 1;
        overflow-y: auto;
      }

      .sidebar-item {
        padding: 10px 12px;
        border: none;
        background: transparent;
        color: var(--bone-fade);
        text-align: left;
        cursor: pointer;
        border-left: 3px solid transparent;
        transition: all 0.2s;
      }

      .sidebar-item:hover {
        background: var(--void-2);
        color: var(--bone);
      }

      .sidebar-item.active {
        background: var(--void-2);
        border-left-color: var(--sigil);
        color: var(--sigil);
      }

      .detail-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 28px 40px 80px;
      }

      .placeholder {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        text-align: center;
      }

      .placeholder-title {
        font-size: 24px;
        color: var(--bone-fade);
        opacity: 0.3;
        margin-bottom: 12px;
      }

      .placeholder-desc {
        color: var(--bone-fade);
      }

      .monster-title {
        font-size: 32px;
        color: var(--sigil);
        margin-bottom: 4px;
        font-family: "Libre Baskerville", serif;
      }

      .monster-subtitle {
        color: var(--bone-fade);
        font-style: italic;
        margin-bottom: 16px;
      }

      .section-title {
        color: var(--bone);
        font-size: 16px;
        font-weight: 600;
        margin: 20px 0 12px 0;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--hair-strong);
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 8px;
        margin-bottom: 16px;
      }

      .stat-box {
        border: 1px solid var(--hair);
        background: var(--void-2);
        padding: 10px;
        text-align: center;
      }

      .stat-label {
        font-size: 11px;
        color: var(--bone-fade);
        margin-bottom: 4px;
      }

      .stat-value {
        font-size: 16px;
        color: var(--bone);
        font-weight: 600;
      }

      .card {
        border: 1px solid var(--hair);
        background: var(--void-2);
        padding: 16px;
        margin-bottom: 16px;
      }

      .card-title {
        font-weight: 600;
        color: var(--sigil);
        margin-bottom: 8px;
      }

      .badge {
        display: inline-block;
        padding: 4px 8px;
        background: var(--hair-strong);
        color: var(--bone-fade);
        font-size: 11px;
        margin: 0 4px 4px 0;
      }

      .attack-item {
        border: 1px solid var(--hair);
        background: var(--void-2);
        padding: 12px;
        margin-bottom: 8px;
      }

      .attack-name {
        font-weight: 600;
        color: var(--bone);
        margin-bottom: 4px;
      }

      .attack-damage {
        color: var(--rust);
        font-weight: 600;
        margin-bottom: 4px;
      }

      .power-list {
        list-style: none;
      }

      .power-item {
        padding: 8px 0;
        border-bottom: 1px solid var(--hair);
      }

      .power-item:last-child {
        border-bottom: none;
      }

      .power-name {
        color: var(--sigil);
        font-weight: 600;
      }

      .alt-names {
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--hair);
        text-align: center;
        color: var(--bone-fade);
        font-size: 12px;
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react" src="{{ url_for('static', filename='sidebar.jsx') }}"></script>
    <script type="text/babel" data-presets="react">
{% raw %}
const AppSidebar = () => { const C = window.AppSidebar; return C ? React.createElement(C) : null; };

function TopBar() {
  const [t, setT] = React.useState(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const p = n => String(n).padStart(2, "0");

  return (
    <header>
      <div className="mono flicker" style={{fontSize:10,letterSpacing:"0.22em",color:"var(--sigil)"}}>
        {`${p(t.getHours())}:${p(t.getMinutes())}:${p(t.getSeconds())}`}
      </div>
      <span style={{width:1,height:14,background:"var(--hair-strong)"}}/>
      <div style={{flex:1}}/>
      <a href="/admin" style={{padding:"7px 12px",border:"1px solid var(--hair)",background:"var(--void-1)",color:"var(--bone)",textDecoration:"none",fontSize:11,fontFamily:"IBM Plex Mono",letterSpacing:"0.08em"}}>Admin</a>
    </header>
  );
}

function MonsterDetail({monster, statEmojis}) {
  if (!monster) {
    return (
      <div className="placeholder">
        <div className="placeholder-title">Select a creature</div>
        <div className="placeholder-desc">View detailed statistics from the archives.</div>
      </div>
    );
  }

  const m = monster.monster_entry;
  const emj = s => (statEmojis[s] || '') + ' ' + s;

  return (
    <>
      <h1 className="monster-title">{m.name}</h1>
      {m.subtitle && <div className="monster-subtitle">{m.subtitle}</div>}
      {m.tags && m.tags.length > 0 && (
        <div style={{marginBottom:16}}>
          {m.tags.map(tag => <span key={tag} className="badge">{tag}</span>)}
        </div>
      )}

      {m.description && (
        <div className="card">
          <div>{m.description}</div>
          {m.main_entry_text && <div style={{marginTop:8,fontSize:12,color:"var(--bone-fade)"}}>{m.main_entry_text}</div>}
        </div>
      )}

      <div className="section-title">Characteristics</div>
      <div className="stat-grid">
        {Object.entries(m.characteristics || {}).map(([key, val]) => (
          <div key={key} className="stat-box">
            <div className="stat-label">{statEmojis[key] || ''} {key}</div>
            <div className="stat-value">{typeof val === 'object' ? (val.average || val.value || val) : val}</div>
            {typeof val === 'object' && val.roll && <div style={{fontSize:10,color:"var(--bone-fade)"}}>{val.roll}</div>}
          </div>
        ))}
      </div>

      <div className="section-title">Derived Stats</div>
      <div className="stat-grid">
        <div className="stat-box"><div className="stat-label">{statEmojis['HP'] || ''} HP</div><div className="stat-value" style={{color:"var(--rust)"}}>{m.derived_stats.hit_points}</div></div>
        <div className="stat-box"><div className="stat-label">{statEmojis['DB'] || ''} DB</div><div className="stat-value">{m.derived_stats.damage_bonus}</div></div>
        <div className="stat-box"><div className="stat-label">{statEmojis['Build'] || ''} Build</div><div className="stat-value">{m.derived_stats.build}</div></div>
        <div className="stat-box"><div className="stat-label">{statEmojis['MP'] || ''} MP</div><div className="stat-value">{m.derived_stats.magic_points}</div></div>
        <div className="stat-box">
          <div className="stat-label">{statEmojis['Move'] || ''} Move</div>
          <div className="stat-value">
            {typeof m.derived_stats.move === 'object' ? `${m.derived_stats.move.base}${m.derived_stats.move.special ? ` (${m.derived_stats.move.special})` : ''}` : m.derived_stats.move}
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div>
          <div className="section-title">Combat</div>
          <p style={{marginBottom:8}}><span style={{color:"var(--sigil)",fontWeight:600}}>Attacks per round:</span> {m.combat.attacks_per_round}</p>
          {(m.combat.attacks || []).map((atk, i) => (
            <div key={i} className="attack-item">
              <div className="attack-name">{atk.name}</div>
              <div className="attack-damage">Damage: {atk.damage}</div>
              {atk.success_chance && <div style={{fontSize:12,color:"var(--bone-fade)"}}>Success: {atk.success_chance}</div>}
              {atk.special_effect && <div style={{fontSize:12,color:"var(--sigil)"}}>{atk.special_effect}</div>}
              {atk.description && <div style={{fontSize:11,color:"var(--bone-fade)"}}>{atk.description}</div>}
            </div>
          ))}
          {m.combat.dodge && <p><span style={{color:"var(--sigil)",fontWeight:600}}>Dodge:</span> {m.combat.dodge.success_chance || 'N/A'}</p>}
        </div>

        <div>
          <div className="section-title">Skills & Abilities</div>
          {m.skills && m.skills.length > 0 && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"var(--bone-fade)",marginBottom:8}}>SKILLS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {m.skills.map((s, i) => (
                  <span key={i} className="badge">{s.name} <span style={{marginLeft:4,color:"var(--sigil)"}}>{s.value}</span></span>
                ))}
              </div>
            </div>
          )}

          {m.powers_and_abilities && m.powers_and_abilities.length > 0 && (
            <div>
              <div style={{fontSize:11,color:"var(--bone-fade)",marginBottom:8}}>POWERS</div>
              <ul className="power-list">
                {m.powers_and_abilities.map((p, i) => (
                  <li key={i} className="power-item">
                    <span className="power-name">{p.name}:</span> <span style={{color:"var(--bone-fade)"}}>{p.description}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>
      </div>

      <div className="section-title">Defenses & Magic</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:16}}>
        <div className="card">
          <div style={{fontSize:10,color:"var(--sigil)",fontWeight:600,marginBottom:8}}>ARMOR</div>
          <div>{m.armor ? (m.armor.rating + (m.armor.modifiers ? ` ${m.armor.modifiers}` : '')) : 'None'}</div>
        </div>
        <div className="card">
          <div style={{fontSize:10,color:"var(--sigil)",fontWeight:600,marginBottom:8}}>SPELLS</div>
          <div style={{fontSize:12}}>{m.spells || 'None'}</div>
        </div>
        <div className="card">
          <div style={{fontSize:10,color:"var(--sigil)",fontWeight:600,marginBottom:8}}>SANITY LOSS</div>
          <div style={{color:"var(--rust)"}}>{m.sanity_loss || 'None'}</div>
        </div>
      </div>

      {m.alternative_names && m.alternative_names.length > 0 && (
        <div className="alt-names">
          <em>Also known as: {m.alternative_names.join(', ')}</em>
        </div>
      )}
    </>
  );
}

function App({monstersData, statEmojis}) {
  const [search, setSearch] = React.useState('');
  const [selected, setSelected] = React.useState(null);

  const filtered = monstersData.filter(m =>
    m.monster_entry.name.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      <AppSidebar/>
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
        <TopBar/>
        <div className="layout">
          <div className="sidebar">
            <div className="sidebar-header">Grimoire</div>
            <div className="sidebar-search">
              <input
                type="text"
                placeholder="Search..."
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
            </div>
            <div className="sidebar-list">
              {filtered.length > 0 ? (
                filtered.map((m, i) => (
                  <button
                    key={m.monster_entry.name}
                    className={`sidebar-item ${selected?.monster_entry.name === m.monster_entry.name ? 'active' : ''}`}
                    onClick={() => setSelected(m)}
                  >
                    {m.monster_entry.name}
                  </button>
                ))
              ) : (
                <div style={{padding:"16px",textAlign:"center",color:"var(--bone-fade)"}}>No creatures found.</div>
              )}
            </div>
          </div>
          <div className="detail-panel">
            <MonsterDetail monster={selected} statEmojis={statEmojis}/>
          </div>
        </div>
      </div>
    </div>
  );
}

const MONSTERS_DATA = {{ data.monsters | tojson }};
const STAT_EMOJIS = {{ stat_emojis | tojson }};

ReactDOM.createRoot(document.getElementById('root')).render(
  <App monstersData={MONSTERS_DATA} statEmojis={STAT_EMOJIS}/>
);
{% endraw %}
    </script>
</body>
</html>
