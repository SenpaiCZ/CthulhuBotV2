<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Monsters — Grimoire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
  :root {
    --void-0: #020305;
    --void-1: #05070a;
    --void-2: #0a0d11;
    --void-3: #10141a;
    --void-4: #161b23;
    --hair: rgba(190,210,195,0.08);
    --hair-strong: rgba(190,210,195,0.15);
    --bone: oklch(0.96 0.008 75);
    --bone-dim: oklch(0.88 0.01 75);
    --bone-fade: oklch(0.65 0.01 75);
    --sigil: oklch(0.78 0.16 152);
    --sigil-deep: oklch(0.52 0.14 152);
    --sigil-glow: oklch(0.85 0.18 152 / 0.35);
    --sigil-g: oklch(0.85 0.18 152 / 0.6);
    --rust: oklch(0.62 0.16 28);
    --rust-deep: oklch(0.45 0.15 28);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--void-0);color:var(--bone);height:100vh;overflow:hidden}
  body{font-family:"Inter Tight",system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased}
  
  .layout{display:flex;height:100vh;width:100vw}
  .sidebar-browser{flex:0 0 300px;display:flex;flex-direction:column;border-right:1px solid var(--hair-strong);background:var(--void-1)}
  .sidebar-header{padding:16px 20px;border-bottom:1px solid var(--hair-strong);font-weight:600;color:var(--sigil);font-size:12px;letter-spacing:0.08em;text-transform:uppercase}
  .sidebar-search{padding:12px 16px}
  .sidebar-search input{width:100%;padding:8px 12px;border:1px solid var(--hair-strong);background:var(--void-2);color:var(--bone);font-size:13px;outline:none}
  .sidebar-search input:focus{border-color:var(--sigil-glow)}
  
  .sidebar-list{flex:1;overflow-y:auto;padding:8px 0}
  .sidebar-item{padding:10px 20px;border:none;background:transparent;color:var(--bone-fade);text-align:left;cursor:pointer;border-left:3px solid transparent;transition:all 0.2s;font-size:14px;width:100%;display:block}
  .sidebar-item:hover{background:rgba(190,210,195,0.05);color:var(--bone)}
  .sidebar-item.active{background:rgba(190,210,195,0.08);border-left-color:var(--sigil);color:var(--sigil)}

  .detail-panel{flex:1;overflow-y:auto;padding:40px 60px 100px;background:linear-gradient(135deg, var(--void-0), var(--void-2))}
  .placeholder{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;text-align:center;opacity:0.3}
  .placeholder-title{font-size:28px;color:var(--bone-fade);font-family:"IM Fell English",serif}

  .monster-title{font-size:48px;color:var(--sigil);margin-bottom:8px;font-family:"IM Fell English",serif;line-height:1}
  .section-title{color:var(--bone);font-size:14px;font-weight:600;margin:24px 0 12px 0;padding-bottom:8px;border-bottom:1px solid var(--hair-strong);text-transform:uppercase;letter-spacing:0.1em}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;margin-bottom:16px}
  .stat-box{border:1px solid var(--hair-strong);background:var(--void-2);padding:10px;text-align:center;border-radius:4px}
  .stat-label{font-size:11px;color:var(--bone-fade);margin-bottom:4px}
  .stat-value{font-size:16px;color:var(--bone);font-weight:600}
  .card-eld{border:1px solid var(--hair-strong);background:var(--void-3);padding:16px;margin-bottom:16px;border-radius:4px}
  .badge-eld{display:inline-block;padding:4px 8px;background:var(--sigil-deep);color:white;font-size:11px;margin:0 4px 4px 0;border-radius:2px;font-weight:600}
  
  pre.raw-view{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--sigil);background:var(--void-1);padding:20px;border:1px solid var(--hair);overflowX:auto;border-radius:4px}
  
  /* Scrollbar */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--hair-strong)}
  ::-webkit-scrollbar-thumb:hover{background:var(--sigil-glow)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='sidebar.jsx') }}"></script>
<script type="text/babel" data-presets="react">
const MONSTERS_DATA = {{ data | tojson }};
const STAT_EMOJIS = {{ stat_emojis | tojson }};
const IS_ADMIN = {{ is_admin | tojson }};

{% raw %}
const AppSidebar = () => { const C = window.AppSidebar; return C ? React.createElement(C) : null; };

function TopBar() {
  return (
    <header style={{flexShrink:0,display:"flex",alignItems:"center",gap:16,padding:"16px 32px",borderBottom:"1px solid var(--hair-strong)",background:"rgba(2,3,5,0.8)",backdropFilter:"blur(10px)",zIndex:10}}>
      <div className="serif" style={{fontSize:18,color:"var(--sigil)",letterSpacing:"0.05em"}}>Grimoire Explorer</div>
      <div style={{flex:1}}/>
      <a href="/admin" style={{padding:"7px 12px",border:"1px solid var(--hair-strong)",background:"transparent",color:"var(--bone)",textDecoration:"none",fontSize:11,fontFamily:"IBM Plex Mono",letterSpacing:"0.08em"}}>Admin</a>
    </header>
  );
}

function MonsterDetail({monster, statEmojis}) {
  const [showRaw, setShowRaw] = React.useState(false);
  const [imageUrl, setImageUrl] = React.useState(null);
  
  React.useEffect(() => {
    if (monster) {
      const name = monster.monster_entry?.name || monster.name;
      fetch(`/api/images/check?type_slug=monster&name=${encodeURIComponent(name)}`)
        .then(r => r.json())
        .then(data => {
          if (data.found) setImageUrl(data.url + '?t=' + new Date().getTime());
          else setImageUrl(null);
        })
        .catch(() => setImageUrl(null));
    }
  }, [monster]);

  if (!monster) {
    return (
      <div className="placeholder">
        <div className="placeholder-title">Select a creature from the archives</div>
      </div>
    );
  }
  const m = monster.monster_entry;
  
  const renderStat = (key, val) => {
    const emojiStr = STAT_EMOJIS[key] || '';
    let valStr = typeof val === 'object' ? (val.average || val.value || val) : val;
    let rollStr = typeof val === 'object' ? val.roll : null;
    
    return (
      <div key={key} className="stat-box">
        <div className="stat-label">{emojiStr} {key}</div>
        <div className="stat-value">{valStr}</div>
        {rollStr && <div className="stat-label" style={{fontSize: '9px', opacity: 0.7, marginTop:2}}>{rollStr}</div>}
      </div>
    );
  };

  return (
    <div style={{position:'relative'}}>
      <button 
        onClick={() => setShowRaw(!showRaw)}
        style={{position:'absolute', right:0, top:-30, fontSize:'10px', background:'transparent', border:'1px solid var(--hair)', color:'var(--bone-fade)', padding:'4px 8px', cursor:'pointer', fontFamily:'IBM Plex Mono'}}
      >
        {showRaw ? '[ SHOW UI ]' : '[ VIEW RAW ]'}
      </button>

      {showRaw ? (
        <pre className="raw-view">
          {JSON.stringify(m, null, 2)}
        </pre>
      ) : (
        <>
          <div style={{display:'flex', gap:40, alignItems:'flex-start', marginBottom:30}}>
            <div style={{flex:1}}>
              <h1 className="monster-title">{m.name}</h1>
              {m.subtitle && <div style={{color:"var(--bone-fade)", fontStyle:"italic", fontSize:'20px', marginBottom:12}}>{m.subtitle}</div>}
              <div style={{display:'flex', flexWrap:'wrap', gap:4, marginBottom:16}}>
                {m.tags && m.tags.map(tag => <span key={tag} className="badge-eld">{tag}</span>)}
              </div>
              {m.alternative_names && m.alternative_names.length > 0 && (
                <div style={{fontSize:'14px', color:'var(--bone-fade)', marginBottom:10}}>
                  <strong style={{color:'var(--bone)'}}>Also known as:</strong> {m.alternative_names.join(', ')}
                </div>
              )}
            </div>
            
            {imageUrl && (
              <div style={{width: 320, flexShrink: 0}}>
                <img src={imageUrl} alt={m.name} style={{width:'100%', borderRadius:'4px', border:'1px solid var(--hair-strong)', boxShadow:'0 10px 30px rgba(0,0,0,0.5)'}} />
              </div>
            )}
          </div>

          <div className="card-eld" style={{borderLeft: '4px solid var(--sigil)', background:'rgba(120,220,170,0.03)', fontSize:'16px', lineHeight:1.6}}>
             {m.description}
          </div>
          
          {m.main_entry_text && m.main_entry_text !== m.description && (
            <div className="card-eld" style={{fontSize:'14px', opacity:0.8, fontStyle:'italic', background:'transparent'}}>
              {m.main_entry_text}
            </div>
          )}

          <div className="section-title">Characteristics</div>
          <div className="stat-grid">
            {Object.entries(m.characteristics || {}).map(([key, val]) => renderStat(key, val))}
          </div>

          <div className="section-title">Derived Stats</div>
          <div className="stat-grid" style={{gridTemplateColumns:'repeat(5, 1fr)'}}>
            <div className="stat-box">
              <div className="stat-label">HP</div>
              <div className="stat-value" style={{color:'var(--rust)'}}>{m.derived_stats?.hit_points}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">DB</div>
              <div className="stat-value">{m.derived_stats?.damage_bonus}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Build</div>
              <div className="stat-value">{m.derived_stats?.build}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">MP</div>
              <div className="stat-value" style={{color:'var(--sigil)'}}>{m.derived_stats?.magic_points}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Move</div>
              <div className="stat-value">
                {typeof m.derived_stats?.move === 'object' ? m.derived_stats.move.base : m.derived_stats?.move}
                {m.derived_stats?.move?.special && <div style={{fontSize:'10px', color:'var(--bone-fade)', marginTop:2}}>{m.derived_stats.move.special}</div>}
              </div>
            </div>
          </div>

          <div style={{display:'flex', gap:30, marginTop:20}}>
            <div style={{flex:1}}>
              <div className="section-title">Combat</div>
              <div className="card-eld" style={{padding:0, overflow:'hidden'}}>
                <div style={{padding:'12px 20px', background:'var(--void-4)', borderBottom:'1px solid var(--hair)', fontSize:'14px'}}>
                  <strong>Attacks per round:</strong> {m.combat?.attacks_per_round}
                </div>
                {m.combat?.attacks?.map((atk, i) => (
                  <div key={i} style={{padding:'16px 20px', borderBottom: i < m.combat.attacks.length-1 ? '1px solid var(--hair)' : 'none'}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                      <div>
                        <div style={{color:'var(--sigil)', fontWeight:'bold', fontSize:'17px'}}>{atk.name}</div>
                        <div style={{fontSize:'14px', color:'var(--rust)', fontWeight:'bold', marginTop:4}}>Damage: {atk.damage}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div className="mono" style={{fontSize:'18px', color:'var(--sigil)'}}>{atk.success_chance}</div>
                        {(atk.difficulty_hard || atk.difficulty_extreme) && (
                          <div style={{fontSize:'11px', color:'var(--bone-fade)', marginTop:2}}>
                            H: {atk.difficulty_hard} | E: {atk.difficulty_extreme}
                          </div>
                        )}
                      </div>
                    </div>
                    {atk.special_effect && <div style={{fontSize:'13px', fontStyle:'italic', color:'var(--bone-fade)', marginTop:6}}>Effect: {atk.special_effect}</div>}
                    {atk.description && <div style={{fontSize:'13px', color:'var(--bone-dim)', marginTop:6, lineHeight:1.5}}>{atk.description}</div>}
                  </div>
                ))}
                <div style={{padding:'12px 20px', background:'var(--void-4)', borderTop:'1px solid var(--hair)', display:'flex', justifyContent:'space-between', fontSize:'14px'}}>
                   <strong>Dodge:</strong>
                   <span className="mono" style={{fontWeight:'bold'}}>
                     {m.combat?.dodge?.success_chance || 'N/A'}
                     {m.combat?.dodge?.difficulty_hard && ` (H: ${m.combat.dodge.difficulty_hard}, E: ${m.combat.dodge.difficulty_extreme})`}
                   </span>
                </div>
              </div>
            </div>

            <div style={{width:350, flexShrink:0}}>
              <div className="section-title">Defenses & Magic</div>
              <div className="card-eld">
                <div style={{marginBottom:15}}>
                  <div className="stat-label">Armor</div>
                  <div style={{fontSize:'16px', fontWeight:'bold'}}>{m.armor?.rating || 'None'}</div>
                  {m.armor?.modifiers && <div style={{fontSize:'13px', color:'var(--bone-fade)', marginTop:4}}>{m.armor.modifiers}</div>}
                </div>
                <div style={{marginBottom:15, padding:'12px 0', borderTop:'1px solid var(--hair)'}}>
                  <div className="stat-label">Spells</div>
                  <div style={{fontSize:'14px', lineHeight:1.5}}>{m.spells || 'None'}</div>
                </div>
                <div style={{paddingTop:12, borderTop:'1px solid var(--hair)'}}>
                  <div className="stat-label">Sanity Loss</div>
                  <div style={{fontSize:'16px', color:'var(--rust)', fontWeight:'bold'}}>{m.sanity_loss || 'None'}</div>
                </div>
              </div>

              <div className="section-title">Skills</div>
              <div className="card-eld" style={{display:'flex', flexWrap:'wrap', gap:8, padding:'12px'}}>
                {m.skills?.map((s, i) => (
                  <div key={i} style={{fontSize:'13px', background:'var(--void-2)', padding:'6px 12px', border:'1px solid var(--hair-strong)', borderRadius:'3px'}}>
                    {s.name} <span style={{color:'var(--sigil)', fontWeight:'bold', marginLeft:4}}>{s.value}</span>
                  </div>
                ))}
                {(!m.skills || m.skills.length === 0) && <span style={{color:'var(--bone-fade)', fontSize:'13px'}}>None listed.</span>}
              </div>
            </div>
          </div>

          {m.powers_and_abilities && m.powers_and_abilities.length > 0 && (
            <>
              <div className="section-title">Powers & Abilities</div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20}}>
                {m.powers_and_abilities.map((p, i) => (
                  <div key={i} className="card-eld" style={{margin:0, borderTop:'2px solid var(--sigil)'}}>
                    <div style={{color:'var(--sigil)', fontWeight:'bold', marginBottom:8, fontSize:'16px'}}>{p.name}</div>
                    <div style={{fontSize:'14px', lineHeight:1.6, color:'var(--bone-dim)'}}>{p.description}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </>
      )}
    </div>
  );
}

function App() {
  const [search, setSearch] = React.useState('');
  const [selected, setSelected] = React.useState(null);
  
  const rawData = MONSTERS_DATA;
  const data = React.useMemo(() => {
    return Array.isArray(rawData) ? rawData : rawData.monsters || [];
  }, [rawData]);

  const filtered = React.useMemo(() => {
    return data.filter(m => {
      const name = m.monster_entry?.name || m.name || '';
      return name.toLowerCase().includes(search.toLowerCase());
    });
  }, [data, search]);

  return (
    <div style={{display:"flex",height:"100vh"}}>
      <AppSidebar/>
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
        <TopBar/>
        <div className="layout">
          <div className="sidebar-browser">
            <div className="sidebar-header">The Bestiary</div>
            <div className="sidebar-search">
              <input type="text" placeholder="Search creatures…" value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <div className="sidebar-list">
              {filtered.length > 0 ? (
                filtered.map((m, i) => {
                  const name = m.monster_entry?.name || m.name || 'Unknown';
                  const isActive = selected?.monster_entry?.name === name || selected?.name === name;
                  return (
                    <button key={i} className={`sidebar-item ${isActive ? 'active' : ''}`} onClick={() => setSelected(m)}>
                      {name}
                    </button>
                  );
                })
              ) : (
                <div style={{padding:20,textAlign:"center",color:"var(--bone-fade)",fontSize:13,opacity:0.5}}>No entries found.</div>
              )}
            </div>
          </div>
          <div className="detail-panel" id="detailPanel">
            <MonsterDetail monster={selected} statEmojis={STAT_EMOJIS}/>
          </div>
        </div>
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
{% endraw %}
</script>
</body>
</html>
