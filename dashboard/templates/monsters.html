<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Monsters - Grimoire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --void-0: #05070a;
    --void-1: #0a0d11;
    --void-2: #10141a;
    --void-3: #161b23;
    --void-4: #1e242e;
    --hair: rgba(190,210,195,0.08);
    --hair-strong: rgba(190,210,195,0.15);
    --bone: oklch(0.93 0.012 75);
    --bone-dim: oklch(0.78 0.015 75);
    --bone-fade: oklch(0.52 0.015 75);
    --sigil: oklch(0.78 0.16 152);
    --sigil-deep: oklch(0.52 0.14 152);
    --sigil-glow: oklch(0.85 0.18 152 / 0.35);
    --sigil-g: oklch(0.85 0.18 152 / 0.6);
    --rust: oklch(0.62 0.16 28);
    --rust-deep: oklch(0.45 0.15 28);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--void-0);color:var(--bone)}
  body{font-family:"Inter Tight",system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased}
  .serif{font-family:"IM Fell English SC","IM Fell English",serif;letter-spacing:0.02em}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
  @keyframes flicker{0%,92%,100%{opacity:1}93%{opacity:0.35}94%{opacity:1}96%{opacity:0.65}97%{opacity:1}}
  .flicker{animation:flicker 7s infinite}

  #root{display:flex;height:100vh;overflow:hidden}
  header{flex-shrink:0;display:flex;align-items:center;gap:16px;padding:16px 32px;border-bottom:1px solid var(--hair-strong);background:linear-gradient(180deg,var(--void-0),transparent);position:sticky;top:0;z-index:10}

  .layout{display:flex;flex:1;min-height:0}
  .sidebar{flex:0 0 260px;display:flex;flex-direction:column;border-right:1px solid var(--hair-strong);background:linear-gradient(180deg,var(--void-1),var(--void-0))}
  .sidebar-header{padding:12px 16px;border-bottom:1px solid var(--hair-strong);font-weight:600;color:var(--sigil);font-size:12px;letter-spacing:0.08em}
  .sidebar-search{padding:10px}
  .sidebar-search input{width:100%;padding:7px 10px;border:1px solid var(--hair-strong);background:var(--void-2);color:var(--bone);font-size:12px}
  .sidebar-list{flex:1;overflow-y:auto}
  .sidebar-item{padding:8px 12px;border:none;background:transparent;color:var(--bone-fade);text-align:left;cursor:pointer;border-left:3px solid transparent;transition:all 0.2s;font-size:13px}
  .sidebar-item:hover{background:rgba(190,210,195,0.05);color:var(--bone)}
  .sidebar-item.active{background:rgba(190,210,195,0.08);border-left-color:var(--sigil);color:var(--sigil)}

  .detail-panel{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:28px 40px 80px}
  .placeholder{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;text-align:center}
  .placeholder-title{font-size:24px;color:var(--bone-fade);opacity:0.3}

  .monster-title{font-size:32px;color:var(--sigil);margin-bottom:4px;font-family:"IM Fell English",serif}
  .section-title{color:var(--bone);font-size:14px;font-weight:600;margin:16px 0 8px 0;padding-bottom:8px;border-bottom:1px solid var(--hair-strong)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-bottom:12px}
  .stat-box{border:1px solid var(--hair-strong);background:var(--void-2);padding:8px;text-align:center}
  .stat-label{font-size:10px;color:var(--bone-fade)}
  .stat-value{font-size:14px;color:var(--bone);font-weight:600}
  .card{border:1px solid var(--hair-strong);background:var(--void-2);padding:12px;margin-bottom:12px}
  .badge{display:inline-block;padding:3px 6px;background:var(--void-3);color:var(--bone-fade);font-size:10px;margin:0 3px 3px 0}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='sidebar.jsx') }}"></script>
<script type="text/babel" data-presets="react">
{% raw %}
const AppSidebar = () => { const C = window.AppSidebar; return C ? React.createElement(C) : null; };

function TopBar() {
  const [t, setT] = React.useState(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const p = n => String(n).padStart(2, "0");
  return (
    <header>
      <div className="mono flicker" style={{fontSize:10,letterSpacing:"0.22em",color:"var(--sigil)"}}>
        {`${p(t.getHours())}:${p(t.getMinutes())}:${p(t.getSeconds())}`}
      </div>
      <span style={{width:1,height:14,background:"var(--hair-strong)"}}/>
      <div style={{flex:1}}/>
      <a href="/admin" style={{padding:"7px 12px",border:"1px solid var(--hair-strong)",background:"transparent",color:"var(--bone)",textDecoration:"none",fontSize:11,fontFamily:"IBM Plex Mono",letterSpacing:"0.08em"}}>Admin</a>
    </header>
  );
}

function MonsterDetail({monster, statEmojis}) {
  if (!monster) {
    return (
      <div className="placeholder">
        <div className="placeholder-title">Select a creature</div>
      </div>
    );
  }
  const m = monster.monster_entry;
  return (
    <>
      <h1 className="monster-title">{m.name}</h1>
      {m.subtitle && <div style={{color:"var(--bone-fade)",fontStyle:"italic",marginBottom:12}}>{m.subtitle}</div>}
      {m.tags && m.tags.length > 0 && (
        <div style={{marginBottom:12}}>
          {m.tags.map(tag => <span key={tag} className="badge">{tag}</span>)}
        </div>
      )}
      {m.description && <div className="card">{m.description}</div>}
      <div className="section-title">Characteristics</div>
      <div className="stat-grid">
        {Object.entries(m.characteristics || {}).map(([key, val]) => (
          <div key={key} className="stat-box">
            <div className="stat-label">{key}</div>
            <div className="stat-value">{typeof val === 'object' ? (val.average || val.value || val) : val}</div>
          </div>
        ))}
      </div>
      <div className="section-title">Combat</div>
      <div>Attacks: {m.combat?.attacks_per_round || 'N/A'}</div>
    </>
  );
}

function App({monstersData, statEmojis}) {
  const [search, setSearch] = React.useState('');
  const [selected, setSelected] = React.useState(null);
  const filtered = monstersData.filter(m => m.monster_entry.name.toLowerCase().includes(search.toLowerCase()));

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      <AppSidebar/>
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
        <TopBar/>
        <div className="layout">
          <div className="sidebar">
            <div className="sidebar-header">Grimoire</div>
            <div className="sidebar-search">
              <input type="text" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <div className="sidebar-list">
              {filtered.length > 0 ? (
                filtered.map(m => (
                  <button key={m.monster_entry.name} className={`sidebar-item ${selected?.monster_entry.name === m.monster_entry.name ? 'active' : ''}`} onClick={() => setSelected(m)}>
                    {m.monster_entry.name}
                  </button>
                ))
              ) : (
                <div style={{padding:12,textAlign:"center",color:"var(--bone-fade)",fontSize:12}}>No creatures found.</div>
              )}
            </div>
          </div>
          <div className="detail-panel">
            <MonsterDetail monster={selected} statEmojis={statEmojis}/>
          </div>
        </div>
      </div>
    </div>
  );
}

const MONSTERS_DATA = {{ data | tojson }};
const STAT_EMOJIS = {{ stat_emojis | tojson }};
ReactDOM.createRoot(document.getElementById('root')).render(<App monstersData={MONSTERS_DATA} statEmojis={STAT_EMOJIS}/>);
{% endraw %}
</script>
</body>
</html>
