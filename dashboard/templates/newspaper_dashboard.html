{% extends "base.html" %}

{% block title %}Newspaper Generator — CthulhuBot{% endblock %}

{% block content %}
<div class="mb-4">
    <div class="label">Prop Manifestation</div>
    <h2 class="serif" style="fontSize:32px; margin:8px 0 0">Newspaper Generator</h2>
</div>

<div class="card-h mb-5">
    <window.Corners/>
    <div class="card-header serif" style="fontSize:18px">
        <span style="color:var(--sigil); margin-right:8px">✶</span> Newspaper Details
    </div>
    <div class="card-body p-4">
        <form id="newspaperForm" target="_blank" action="/render/newspaper" method="get">
            <div class="row g-4">
                <div class="col-md-6">
                    <label for="name" class="label mb-2" style="display:block">Newspaper Name</label>
                    <input type="text" class="form-control bg-dark text-light border-secondary serif" id="name" name="name" value="The Arkham Advertiser" style="font-size:16px">
                </div>
                <div class="col-md-3">
                    <label for="city" class="label mb-2" style="display:block">City</label>
                    <input type="text" class="form-control bg-dark text-light border-secondary serif" id="city" name="city" value="Arkham" style="font-size:16px">
                </div>
                <div class="col-md-3">
                    <label for="date" class="label mb-2" style="display:block">Date</label>
                    <input type="text" class="form-control bg-dark text-light border-secondary mono" id="date" name="date" value="October 24, 1929" style="font-size:13px">
                </div>

                <div class="col-12">
                    <label for="headline" class="label mb-2" style="display:block">Headline</label>
                    <input type="text" class="form-control bg-dark text-light border-secondary serif" id="headline" name="headline" value="MYSTERIOUS LIGHTS SEEN OVER MISKATONIC UNIVERSITY" style="font-size:22px; color:var(--sigil) !important">
                </div>

                <div class="col-12">
                    <label for="body" class="label mb-2" style="display:block">Article Body</label>
                    <textarea class="form-control bg-dark text-light border-secondary serif-i" id="body" name="body" rows="10" style="font-size:15px; line-height:1.6">Residents were awoken late last night by strange, iridescent lights hovering over the Miskatonic University campus. Witnesses describe a low humming sound that seemed to vibrate through the very ground.

Professor Armitage, when reached for comment, dismissed the reports as "swamp gas reflecting off low clouds," though several students reported seeing faculty members rushing towards the library with look of concern.

Local authorities have cordoned off the area near the Science Building, citing a "chemical spill," but rumors persist of something far more unnatural occurring within those hallowed halls.</textarea>
                    <div class="serif-i mt-2" style="font-size:12px; color:var(--bone-fade)">Use newlines for paragraphs.</div>
                </div>

                 <div class="col-md-6">
                    <label for="width" class="label mb-2" style="display:block">Visual Width: <span id="widthVal" class="mono" style="color:var(--sigil)">500</span>px</label>
                    <input type="range" class="form-range" id="width" name="width" min="400" max="800" step="10" value="500" oninput="document.getElementById('widthVal').textContent = this.value">
                </div>

                <div class="col-md-6 d-flex align-items-end">
                    <button type="button" class="btn-eld w-100" style="justify-content:center" onclick="randomizeClipPath()">RANDOMIZE EDGE SHAPE</button>
                    <input type="hidden" id="clip_path" name="clip_path" value="0% 0%, 100% 0%, 100% 100%, 0% 100%">
                </div>
            </div>

            <div class="mt-5">
                <button type="submit" class="btn-eld primary w-100" style="justify-content:center; font-size:14px; padding:16px">MANIFEST NEWSPAPER CLIPPING</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
function randomizeClipPath() {
    let points = [];
    // Top edge
    for (let i = 0; i <= 100; i += 5) { points.push(`${i}% ${Math.random() * 2}%`); }
    // Right edge
    for (let i = 0; i <= 100; i += 5) { points.push(`${100 - (Math.random() * 2)}% ${i}%`); }
    // Bottom edge
    for (let i = 100; i >= 0; i -= 5) { points.push(`${i}% ${100 - (Math.random() * 2)}%`); }
    // Left edge
    for (let i = 100; i >= 0; i -= 5) { points.push(`${Math.random() * 2}% ${i}%`); }
    document.getElementById('clip_path').value = points.join(', ');
}
document.addEventListener('DOMContentLoaded', randomizeClipPath);
</script>
{% endblock %}
