<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-theme="{{ dashboard_theme|default('cthulhu') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ talent.name }} — Pulp Talent Render</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/themes.css') }}" rel="stylesheet">
    {% include 'includes/font_styles.html' %}
    <style>
        body {
            background-color: var(--void-0);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            -webkit-font-smoothing: antialiased;
        }

        .coc-sheet {
            background: linear-gradient(160deg, var(--void-1), var(--void-0));
            color: var(--bone);
            font-family: var(--font-body, var(--font-sans));
            border: 2px solid var(--sigil-deep);
            padding: 40px;
            width: 700px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .corners span {
            position: absolute; width: 20px; height: 20px; border-color: var(--sigil); opacity: 0.6;
        }
        .corners span:nth-child(1) { top: -2px; left: -2px; border-top: 2px solid; border-left: 2px solid; }
        .corners span:nth-child(2) { top: -2px; right: -2px; border-top: 2px solid; border-right: 2px solid; }
        .corners span:nth-child(3) { bottom: -2px; left: -2px; border-bottom: 2px solid; border-left: 2px solid; }
        .corners span:nth-child(4) { bottom: -2px; right: -2px; border-bottom: 2px solid; border-right: 2px solid; }
    </style>
</head>
<body>
    <div class="coc-sheet">
        <div class="corners"><span></span><span></span><span></span><span></span></div>

        <div class="d-flex align-items-start gap-4">
            <div class="flex-grow-1">
                <div class="mb-4">
                    <div class="label" style="color:var(--sigil); font-size:10px; letter-spacing:4px">HEROIC TALENT</div>
                    <h1 class="serif" style="font-size:3.5rem; color:var(--sigil); margin:8px 0 0; line-height:1">{{ talent.name }}</h1>
                    <div style="margin-top:8px">
                        <span class="badge bg-dark border border-secondary mono" style="font-size:10px; borderRadius:0; padding:6px 10px">{{ talent.category|upper }}</span>
                    </div>
                </div>

                <div class="card-h p-4 mb-2" style="border-left: 4px solid var(--sigil); font-size: 1.1rem; line-height: 1.7; color: var(--bone)">
                    <window.Corners/>
                    <div class="serif-i">
                        {{ talent.description | format_custom_emoji | format_bold | safe }}
                    </div>
                </div>
            </div>

            {% if image_url %}
            <div style="width: 220px; flex-shrink: 0; padding-top: 10px">
                <img src="{{ image_url }}" class="img-fluid border border-secondary shadow-lg" alt="{{ talent.name }}" style="width: 100%;">
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
