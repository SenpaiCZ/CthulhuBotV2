{% extends 'base.html' %}

{% block title %}Spells — Grimoire{% endblock %}

{% block content %}
<div id="spells-root"></div>
{% endblock %}

{% block scripts %}
<script type="text/babel" data-presets="react">
const SPELLS_DATA = {{ data.spells | tojson }};
const TYPE_SLUG = '{{ type_slug }}';

{% raw %}
const { useState, useMemo, useEffect } = React;

function SpellDetail({spell}) {
  const [imageUrl, setImageUrl] = useState(null);
  
  useEffect(() => {
    if (spell) {
      const s = spell.spell_entry;
      fetch(`/api/images/check?type_slug=${TYPE_SLUG}&name=${encodeURIComponent(s.name)}`)
        .then(r => r.json())
        .then(data => {
          if (data.found) setImageUrl(data.url + '?t=' + new Date().getTime());
          else setImageUrl(null);
        })
        .catch(() => setImageUrl(null));
    }
  }, [spell]);

  if (!spell) {
    return (
      <div style={{display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", height:"100%", textAlign:"center", opacity:0.3, minHeight:400}}>
        <div className="serif" style={{fontSize:28, color:"var(--bone-fade)"}}>Select an incantation from the archives</div>
      </div>
    );
  }
  const s = spell.spell_entry;

  return (
    <div style={{position:'relative'}}>
      <div style={{display:'flex', gap:40, alignItems:'flex-start', marginBottom:30, flexWrap:'wrap'}}>
        <div style={{flex:1, minWidth:300}}>
          <div className="label" style={{color:"var(--sigil)"}}>Arcane Incantation</div>
          <h1 className="serif" style={{fontSize:48, color:"var(--sigil)", margin:"8px 0"}}>{s.name}</h1>
          <div className="serif-i" style={{color:"var(--bone-fade)", fontSize:20, marginBottom:16}}>{s.category || 'Unknown Category'}</div>
        </div>
        
        {imageUrl && (
          <div style={{maxWidth: 400, flex: "1 0 300px"}}>
            <img src={imageUrl} alt={s.name} style={{width:'100%', border:'1px solid var(--hair-strong)', boxShadow:'0 10px 30px rgba(0,0,0,0.5)'}} />
          </div>
        )}
      </div>

      <div className="card-h p-4 mb-5" style={{borderLeft: '4px solid var(--sigil)', fontSize:'17px', lineHeight:1.6, color:"var(--bone)"}}>
         <window.Corners/>
         {s.effect?.description}
      </div>

      <div className="label mb-3" style={{color:"var(--sigil)"}}>Costs & Casting</div>
      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(120px, 1fr))", gap:10, marginBottom:40}}>
        <div className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
          <window.Corners/>
          <div style={{fontSize:10, color:"var(--sigil)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>✧ MAGIC POINTS</div>
          <div style={{fontSize:18, color:"var(--sigil)", fontWeight:600}}>{s.costs?.magic_points || 'None'}</div>
        </div>
        <div className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
          <window.Corners/>
          <div style={{fontSize:10, color:"var(--rust)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>⚖ SANITY</div>
          <div style={{fontSize:18, color:"var(--rust)", fontWeight:600}}>{s.costs?.sanity || 'None'}</div>
        </div>
        <div className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
          <window.Corners/>
          <div style={{fontSize:10, color:"var(--amber)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>⚡ POW</div>
          <div style={{fontSize:18, color:"var(--amber)", fontWeight:600}}>{s.costs?.pow || 'None'}</div>
        </div>
        <div className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
          <window.Corners/>
          <div style={{fontSize:10, color:"var(--bone-fade)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>⧗ CASTING TIME</div>
          <div style={{fontSize:15, color:"var(--bone)", fontWeight:600}}>{s.casting_time || 'Instant'}</div>
        </div>
        <div className="card-h" style={{padding:12, textAlign:"center", background:"var(--void-2)"}}>
          <window.Corners/>
          <div style={{fontSize:10, color:"var(--bone-fade)", marginBottom:4, fontFamily:"var(--font-mono)", letterSpacing:"0.1em"}}>◎ RANGE</div>
          <div style={{fontSize:15, color:"var(--bone)", fontWeight:600}}>{s.range || 'Touch'}</div>
        </div>
      </div>

      <div className="row g-4">
          <div className="col-lg-6">
              <div className="label mb-3" style={{color:"var(--sigil)"}}>Arcane Components</div>
              <div className="card-h p-4 h-100">
                  <window.Corners/>
                  <div className="serif-i" style={{fontSize:14, color:"var(--bone-dim)", lineHeight:1.6}}>
                      {s.costs?.components || "No material components required for this ritual."}
                  </div>
              </div>
          </div>
          <div className="col-lg-6">
              <div className="label mb-3" style={{color:"var(--sigil)"}}>Effect Potential</div>
              <div className="card-h p-4 h-100 d-flex flex-column gap-3">
                  <window.Corners/>
                  {s.effect?.damage && (
                      <div>
                          <div className="label" style={{fontSize:9, color:"var(--rust)"}}>DAMAGE</div>
                          <div className="mono" style={{fontSize:18, color:"var(--rust)", fontWeight:"bold"}}>{s.effect.damage}</div>
                      </div>
                  )}
                  {s.effect?.opposed_roll && (
                      <div>
                          <div className="label" style={{fontSize:9, color:"var(--amber)"}}>OPPOSED ROLL</div>
                          <div className="serif" style={{fontSize:16, color:"var(--bone)"}}>{s.effect.opposed_roll}</div>
                      </div>
                  )}
                  {!s.effect?.damage && !s.effect?.opposed_roll && (
                      <div className="serif-i text-muted">Standard non-combative effect.</div>
                  )}
              </div>
          </div>
      </div>

      {s.deeper_magic && (
        <div className="mt-5">
          <div className="label mb-3" style={{color:"var(--sigil)"}}>Deeper Magic</div>
          <div className="card-h p-4" style={{background:"rgba(120,220,170,0.02)", borderTop:"2px solid var(--sigil)"}}>
            <window.Corners/>
            <div className="serif-i" style={{fontSize:15, lineHeight:1.7, color:"var(--bone-dim)"}}>
                {s.deeper_magic}
            </div>
          </div>
        </div>
      )}

      {s.alternate_names && s.alternate_names.length > 0 && (
        <div className="mt-5 pt-4 text-center border-top border-secondary">
          <div className="label" style={{fontSize:9, color:"var(--bone-fade)", marginBottom:8}}>ALSO KNOWN AS</div>
          <div className="serif-i" style={{fontSize:14, color:"var(--bone-fade)"}}>{s.alternate_names.join(', ')}</div>
        </div>
      )}
    </div>
  );
}

function SpellsApp() {
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  
  const filtered = useMemo(() => {
    return SPELLS_DATA.filter(item => {
      const name = item.spell_entry?.name || '';
      return name.toLowerCase().includes(search.toLowerCase());
    });
  }, [search]);

  return (
    <div className="row g-0" style={{margin:"-2rem -3rem", height:"calc(100vh - 72px)"}}>
      <div className="col-md-3 h-100 d-flex flex-column border-end border-secondary" style={{background:"var(--void-1)"}}>
        <div className="p-4 border-bottom border-secondary">
          <div className="label mb-3">Grimoire Scrolls</div>
          <div className="input-group">
             <span className="input-group-text bg-dark border-secondary text-muted" style={{borderRight:0}}>⌕</span>
             <input type="text" className="form-control bg-dark text-light border-secondary" placeholder="Search spells…" value={search} onChange={e => setSearch(e.target.value)} style={{fontSize:13, borderLeft:0}} />
          </div>
        </div>
        <div style={{flex:1, overflowY:"auto"}}>
            {filtered.length > 0 ? (
                filtered.map((item, i) => {
                    const name = item.spell_entry?.name || 'Unknown';
                    const isActive = selected?.spell_entry?.name === name;
                    return (
                        <button key={i} 
                            onClick={() => setSelected(item)}
                            className="w-100 border-0 text-start py-3 px-4 transition-all"
                            style={{
                                background: isActive ? "rgba(120,220,170,0.08)" : "transparent",
                                color: isActive ? "var(--sigil)" : "var(--bone-dim)",
                                borderLeft: isActive ? "3px solid var(--sigil)" : "3px solid transparent",
                                fontSize: 14,
                                borderBottom: "1px solid var(--hair)"
                            }}
                        >
                            {name}
                        </button>
                    );
                })
            ) : (
                <div className="p-5 text-center serif-i text-muted">No incantations found.</div>
            )}
        </div>
      </div>
      <div className="col-md-9 h-100" style={{overflowY:"auto", padding:"40px 60px 100px"}}>
         <SpellDetail spell={selected} />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('spells-root'));
root.render(<SpellsApp />);
{% endraw %}
</script>
{% endblock %}
