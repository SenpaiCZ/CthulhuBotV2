{% extends 'base.html' %}

{% block title %}Deities — Grimoire{% endblock %}

{% block content %}
<div id="deities-root"></div>
{% endblock %}

{% block scripts %}
<script type="text/babel" data-presets="react">
const DEITIES_DATA = {{ data.deities | tojson }};
const STAT_EMOJIS = {{ stat_emojis | tojson }};
const TYPE_SLUG = '{{ type_slug }}';

{% raw %}
const { useState, useMemo, useEffect } = React;

function DeityDetail({deity}) {
  const [imageUrl, setImageUrl] = useState(null);
  
  useEffect(() => {
    if (deity) {
      const d = deity.deity_entry;
      fetch(`/api/images/check?type_slug=${TYPE_SLUG}&name=${encodeURIComponent(d.name)}`)
        .then(r => r.json())
        .then(data => {
          if (data.found) setImageUrl(data.url + '?t=' + new Date().getTime());
          else setImageUrl(null);
        })
        .catch(() => setImageUrl(null));
    }
  }, [deity]);

  if (!deity) {
    return (
      <div style={{display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", height:"100%", textAlign:"center", opacity:0.3, minHeight:400}}>
        <div className="serif" style={{fontSize:28, color:"var(--bone-fade)"}}>Select a deity from the archives</div>
      </div>
    );
  }
  const d = deity.deity_entry;
  const pm = d.physical_manifestation || {};
  const chars = pm.characteristics || {};
  const combat = pm.combat || {};
  const armor = pm.armor || {};

  return (
    <div style={{position:'relative'}}>
      <div style={{display:'flex', gap:40, alignItems:'flex-start', marginBottom:30, flexWrap:'wrap'}}>
        <div style={{flex:1, minWidth:300}}>
          <div className="label" style={{color:"var(--sigil)"}}>Cosmic Entity</div>
          <h1 className="serif" style={{fontSize:48, color:"var(--sigil)", margin:"8px 0"}}>{d.name}</h1>
          <div className="serif-i" style={{color:"var(--bone-fade)", fontSize:20, marginBottom:16}}>{d.classification || 'Unknown Pantheon'}</div>
          <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:16}}>
            {d.other_names && d.other_names.map(name => <span key={name} className="badge bg-dark border border-secondary" style={{fontSize:10, borderRadius:0, padding:"4px 8px"}}>{name.toUpperCase()}</span>)}
          </div>
        </div>
        
        {imageUrl && (
          <div style={{maxWidth: 400, flex: "1 0 300px"}}>
            <img src={imageUrl} alt={d.name} style={{width:'100%', border:'1px solid var(--hair-strong)', boxShadow:'0 10px 30px rgba(0,0,0,0.5)'}} />
          </div>
        )}
      </div>

      {d.description_quote && (
          <div className="serif-i mb-5" style={{fontSize:18, color:"var(--bone-fade)", padding:"0 40px", borderLeft:"2px solid var(--hair-strong)", fontStyle:"italic"}}>
              "{d.description_quote}"
          </div>
      )}

      <div className="card-h p-4 mb-5" style={{borderLeft: '4px solid var(--sigil)', fontSize:'16px', lineHeight:1.6, color:"var(--bone)"}}>
         <window.Corners/>
         {d.main_entry_text || "The archives are silent regarding this entity's true nature."}
      </div>

      <div className="row g-5">
          <div className="col-lg-6">
              <div className="label mb-3" style={{color:"var(--sigil)"}}>Cult & Resonance</div>
              <div className="card-h p-4 h-100">
                  <window.Corners/>
                  {d.cult ? (
                      <>
                          <div className="serif-i mb-4" style={{fontSize:14, color:"var(--bone-dim)", lineHeight:1.6}}>{d.cult.text}</div>
                          {d.cult.possible_blessings && (
                              <div>
                                  <div className="label mb-3" style={{fontSize:9}}>POSSIBLE BLESSINGS</div>
                                  {d.cult.possible_blessings.map((b, i) => (
                                      <div key={i} className="mb-3">
                                          <div className="serif" style={{color:"var(--sigil)", fontSize:15}}>{b.name}</div>
                                          <div style={{fontSize:12, color:"var(--bone-fade)"}}>{b.description}</div>
                                      </div>
                                  ))}
                              </div>
                          )}
                      </>
                  ) : <div className="serif-i text-muted">No organized cult information exists.</div>}
              </div>
          </div>
          <div className="col-lg-6">
              <div className="label mb-3" style={{color:"var(--sigil)"}}>Manifestation Attributes</div>
              <div className="card-h p-4 mb-4">
                  <window.Corners/>
                  <div className="row g-4 text-center">
                      <div className="col-4">
                          <div className="label" style={{fontSize:9}}>POW</div>
                          <div className="mono" style={{fontSize:18, color:"var(--amber)"}}>{d.magic?.pow || '—'}</div>
                      </div>
                      <div className="col-4">
                          <div className="label" style={{fontSize:9}}>MP</div>
                          <div className="mono" style={{fontSize:18, color:"var(--sigil)"}}>{d.magic?.magic_points || '—'}</div>
                      </div>
                      <div className="col-4">
                          <div className="label" style={{fontSize:9}}>SAN LOSS</div>
                          <div className="mono" style={{fontSize:18, color:"var(--rust)"}}>{d.sanity_loss || '—'}</div>
                      </div>
                  </div>
                  <div className="mt-4 pt-3 border-top border-secondary">
                      <div className="label mb-2" style={{fontSize:9}}>KNOWN ARCANA</div>
                      <div className="serif-i" style={{fontSize:14, color:"var(--bone-dim)"}}>{d.magic?.spells || 'None'}</div>
                  </div>
              </div>
              
              <div className="card-h p-4">
                  <window.Corners/>
                  <div className="mb-3">
                      <div className="label mb-1" style={{fontSize:9}}>ENCOUNTERS</div>
                      <div style={{fontSize:13, color:"var(--bone-dim)"}}>{d.encounters || 'None detailed.'}</div>
                  </div>
                  <div>
                      <div className="label mb-1" style={{fontSize:9}}>AURA</div>
                      <div style={{fontSize:13, color:"var(--bone-dim)"}}>{d.aura || 'None detailed.'}</div>
                  </div>
              </div>
          </div>
      </div>

      {pm.title && (
          <div className="mt-5">
              <div className="label mb-3" style={{color:"var(--sigil)"}}>Physical Manifestation: <span className="serif" style={{fontSize:16}}>{pm.title}</span></div>
              
              <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(100px, 1fr))", gap:10, marginBottom:32}}>
                {['STR','CON','SIZ','DEX','HP','DB','Build','Move'].map(stat => (
                    <div key={stat} className="stat-box" style={{border:"1px solid var(--hair-strong)", background:"var(--void-2)", padding:10, textAlign:"center"}}>
                        <div style={{fontSize:10, color:"var(--bone-fade)", marginBottom:4}}>{STAT_EMOJIS[stat]} {stat}</div>
                        <div style={{fontSize:16, color: stat === 'HP' ? 'var(--rust)' : 'var(--bone)', fontWeight:600}}>{chars[stat] || '—'}</div>
                    </div>
                ))}
              </div>

              <div className="row g-4">
                  <div className="col-lg-7">
                      <div className="label mb-3" style={{fontSize:9}}>COMBAT CAPABILITIES</div>
                      <div className="card-h p-0 overflow-hidden">
                          <window.Corners/>
                          <div style={{padding:'12px 20px', background:'var(--void-4)', borderBottom:'1px solid var(--hair)', fontSize:'12px', color:"var(--bone-fade)"}}>
                            <strong>ATTACKS PER ROUND:</strong> {combat.attacks_per_round || '—'}
                          </div>
                          {combat.attacks?.map((atk, i) => (
                            <div key={i} style={{padding:'16px 20px', borderBottom: i < combat.attacks.length-1 ? '1px solid var(--hair)' : 'none'}}>
                              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                                <div>
                                  <div className="serif" style={{color:'var(--sigil)', fontSize:'17px'}}>{atk.name}</div>
                                  <div className="mono" style={{fontSize:'12px', color:'var(--rust)', marginTop:4}}>DAMAGE: {atk.damage}</div>
                                </div>
                                <div style={{textAlign:'right'}}>
                                  <div className="mono" style={{fontSize:'18px', color:'var(--sigil)'}}>{atk.success_chance}%</div>
                                </div>
                              </div>
                            </div>
                          ))}
                      </div>
                  </div>
                  <div className="col-lg-5">
                      <div className="label mb-3" style={{fontSize:9}}>SPECIAL MANEUVERS & ARMOR</div>
                      {combat.special_maneuvers && (
                          <div className="mb-4">
                              {combat.special_maneuvers.map((sm, i) => (
                                  <div key={i} className="mb-3">
                                      <div className="serif" style={{color:"var(--amber)", fontSize:15}}>{sm.name}</div>
                                      <div style={{fontSize:12, color:"var(--bone-fade)"}}>{sm.description}</div>
                                  </div>
                              ))}
                          </div>
                      )}
                      <div className="card-h p-3" style={{background:"rgba(120,220,170,0.02)"}}>
                          <window.Corners/>
                          <div className="label" style={{fontSize:9, marginBottom:6}}>ARMOR</div>
                          <div className="serif" style={{fontSize:18, color:"var(--bone)"}}>{armor.rating || 'None'}</div>
                          {armor.notes && <div className="serif-i" style={{fontSize:12, color:"var(--bone-fade)", marginTop:4}}>{armor.notes}</div>}
                      </div>
                  </div>
              </div>
          </div>
      )}

      {d.powers && (
          <div className="mt-5">
              <div className="label mb-3" style={{color:"var(--sigil)"}}>Divine Powers</div>
              <div className="row g-4">
                {d.powers.map((p, i) => (
                  <div key={i} className="col-md-6">
                    <div className="card-h p-4 h-100" style={{borderTop:'2px solid var(--sigil)'}}>
                      <window.Corners/>
                      <div className="serif" style={{color:'var(--sigil)', marginBottom:10, fontSize:'18px'}}>{p.name}</div>
                      <div style={{fontSize:14, lineHeight:1.6, color:'var(--bone-dim)'}}>{p.description}</div>
                    </div>
                  </div>
                ))}
              </div>
          </div>
      )}
    </div>
  );
}

function DeitiesApp() {
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  
  const filtered = useMemo(() => {
    return DEITIES_DATA.filter(item => {
      const name = item.deity_entry?.name || '';
      return name.toLowerCase().includes(search.toLowerCase());
    });
  }, [search]);

  return (
    <div className="row g-0" style={{margin:"-2rem -3rem", height:"calc(100vh - 72px)"}}>
      <div className="col-md-3 h-100 d-flex flex-column border-end border-secondary" style={{background:"var(--void-1)"}}>
        <div className="p-4 border-bottom border-secondary">
          <div className="label mb-3">Pantheon Browser</div>
          <div className="input-group">
             <span className="input-group-text bg-dark border-secondary text-muted" style={{borderRight:0}}>⌕</span>
             <input type="text" className="form-control bg-dark text-light border-secondary" placeholder="Search entities…" value={search} onChange={e => setSearch(e.target.value)} style={{fontSize:13, borderLeft:0}} />
          </div>
        </div>
        <div style={{flex:1, overflowY:"auto"}}>
            {filtered.length > 0 ? (
                filtered.map((item, i) => {
                    const name = item.deity_entry?.name || 'Unknown';
                    const isActive = selected?.deity_entry?.name === name;
                    return (
                        <button key={i} 
                            onClick={() => setSelected(item)}
                            className="w-100 border-0 text-start py-3 px-4 transition-all"
                            style={{
                                background: isActive ? "rgba(120,220,170,0.08)" : "transparent",
                                color: isActive ? "var(--sigil)" : "var(--bone-dim)",
                                borderLeft: isActive ? "3px solid var(--sigil)" : "3px solid transparent",
                                fontSize: 14,
                                borderBottom: "1px solid var(--hair)"
                            }}
                        >
                            {name}
                        </button>
                    );
                })
            ) : (
                <div className="p-5 text-center serif-i text-muted">No deities found.</div>
            )}
        </div>
      </div>
      <div className="col-md-9 h-100" style={{overflowY:"auto", padding:"40px 60px 100px"}}>
         <DeityDetail deity={selected} />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('deities-root'));
root.render(<DeitiesApp />);
{% endraw %}
</script>
{% endblock %}
