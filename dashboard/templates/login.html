{% extends 'base.html' %}

{% block title %}Login — CthulhuBot{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="mb-4 text-center">
            <div class="label">Restricted Access</div>
            <h2 class="serif" style="fontSize:32px; margin:8px 0 0">Admin Authentication</h2>
        </div>

        <div class="card-h">
            <window.Corners/>
            <div class="card-header serif py-3" style="font-size:18px">
                <span style="color:var(--sigil); margin-right:8px">◎</span> Ritual of Entry
            </div>
            <div class="card-body p-4 p-md-5">
                {% if error %}
                <div class="alert alert-danger mb-4" role="alert" style="background:rgba(180,70,60,0.1); border-color:var(--rust); color:var(--rust); font-family:var(--font-mono); font-size:12px">
                    {{ error }}
                </div>
                {% endif %}
                <form method="POST" id="loginForm">
                    <div class="mb-4">
                        <label for="password" class="label mb-2" style="display:block">Admin Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control bg-dark text-light border-secondary mono" id="password" name="password" placeholder="••••••••" required autofocus aria-describedby="togglePassword" style="font-size:16px; letter-spacing: 0.2em;">
                            <button class="btn-eld on" type="button" id="togglePassword" aria-label="Toggle password visibility" style="border-left: 0">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-eld primary w-100" style="justify-content:center; padding: 14px; font-size: 13px">
                        COMMUNE WITH SYSTEM
                    </button>
                </form>
            </div>
        </div>
        
        <div class="mt-4 text-center">
            <a href="/" class="label text-decoration-none" style="font-size:9px; color:var(--bone-fade) !important">⟨ BACK TO THE SURFACE</a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        const form = document.getElementById('loginForm');

        if (togglePassword && password) {
            togglePassword.addEventListener('click', function () {
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                const icon = this.querySelector('i');
                if (icon) {
                    icon.classList.toggle('bi-eye');
                    icon.classList.toggle('bi-eye-slash');
                }
            });
        }

        if (form) {
            form.addEventListener('submit', function() {
                const btn = this.querySelector('button[type="submit"]');
                if (btn) {
                    btn.disabled = true;
                    btn.innerHTML = '<span class="pulse-dot" style="display:inline-block; width:8px; height:8px; background:var(--sigil); border-radius:50%; margin-right:10px"></span> ASCENDING...';
                }
            });
        }
    });
</script>
{% endblock %}
