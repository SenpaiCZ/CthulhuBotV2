{% extends 'base.html' %}

{% block title %}Music Dashboard{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
    <h2 class="mb-0">🎵 Music Dashboard</h2>
    <span id="refresh-indicator" class="badge bg-secondary ms-auto" style="font-size:0.75rem;">Auto-refresh: ON</span>
</div>

<div id="guilds-container">
    <div class="text-center py-5 text-muted">
        <div class="spinner-border text-secondary mb-3" role="status"></div>
        <div>Loading music data…</div>
    </div>
</div>

<style>
.music-card { border: 1px solid var(--theme-border-color); background: var(--theme-bg-card); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
.music-card-header { background: rgba(var(--theme-primary-rgb), 0.12); border-bottom: 1px solid var(--theme-border-color); padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
.music-card-header .guild-name { font-weight: 700; color: var(--theme-primary-bright); font-size: 1.1rem; }
.music-body { padding: 1.25rem; }

/* Now Playing */
.now-playing { display: flex; gap: 1.25rem; align-items: flex-start; }
.track-art { width: 110px; height: 82px; object-fit: cover; border-radius: 8px; flex-shrink: 0; border: 1px solid var(--theme-border-color); background: #111; }
.track-art-placeholder { width: 110px; height: 82px; border-radius: 8px; flex-shrink: 0; border: 1px solid var(--theme-border-color); background: rgba(var(--theme-primary-rgb),0.08); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--theme-primary-dark); }
.track-info { flex: 1; min-width: 0; }
.track-title { font-size: 1.1rem; font-weight: 700; color: var(--bs-body-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-title a { color: inherit; text-decoration: none; }
.track-title a:hover { color: var(--theme-primary-bright); }
.track-badges { margin: 0.35rem 0; display: flex; gap: 0.4rem; flex-wrap: wrap; }

/* Progress bar */
.progress-row { margin-top: 0.6rem; }
.progress-bar-wrapper { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; cursor: pointer; margin-bottom: 0.3rem; }
.progress-bar-fill { height: 100%; background: var(--theme-primary-main); border-radius: 3px; transition: width 1s linear; }
.progress-times { display: flex; justify-content: space-between; font-size: 0.78rem; color: #888; font-variant-numeric: tabular-nums; }

/* Volume */
.volume-row { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.75rem; }
.volume-row label { font-size: 0.85rem; color: #888; white-space: nowrap; }
.volume-row input[type=range] { flex: 1; max-width: 180px; }
.volume-pct { font-size: 0.85rem; color: var(--theme-primary-bright); min-width: 36px; font-variant-numeric: tabular-nums; }

/* Controls */
.controls-row { display: flex; gap: 0.5rem; margin-top: 0.85rem; flex-wrap: wrap; }
.btn-control { border-radius: 20px; font-size: 0.82rem; padding: 0.3rem 0.9rem; border-width: 1px; }

/* Queue */
.queue-section { border-top: 1px solid var(--theme-border-color); padding: 1rem 1.25rem 0.5rem; }
.queue-title { font-size: 0.9rem; font-weight: 700; color: var(--theme-primary-main); margin-bottom: 0.6rem; }
.queue-item { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.queue-item:last-child { border-bottom: none; }
.queue-item-title { font-size: 0.88rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 380px; }
.queue-item-dur { font-size: 0.78rem; color: #666; margin: 0 0.5rem; white-space: nowrap; }
.queue-empty { font-size: 0.88rem; color: #555; padding: 0.5rem 0; }

/* No sessions */
.no-sessions { text-align: center; padding: 4rem 2rem; color: #444; }
.no-sessions .icon { font-size: 3rem; margin-bottom: 1rem; }
</style>

<script>
const REFRESH_MS = 3000;
let refreshTimer = null;

function fmtDur(sec) {
    if (!sec || sec <= 0) return null;
    sec = Math.floor(sec);
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function escHtml(t) {
    if (!t) return '';
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function progressBar(elapsed, duration) {
    if (!duration || duration <= 0) return '';
    const pct = Math.min(100, Math.max(0, (elapsed / duration) * 100)).toFixed(1);
    const elStr = fmtDur(elapsed) || '0:00';
    const durStr = fmtDur(duration) || '?:??';
    return `
        <div class="progress-row">
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>
            <div class="progress-times"><span>${elStr}</span><span>${durStr}</span></div>
        </div>`;
}

function renderGuild(guildId, guildData) {
    const track = guildData.current_track;
    const queue = guildData.queue || [];
    const isActive = !!track;
    const isPaused = track?.paused;

    let nowPlayingHtml = `<div class="no-sessions" style="padding:1.5rem 0"><div class="icon">🔇</div><div>Nothing playing</div></div>`;

    if (isActive) {
        const title = escHtml(track.title || 'Unknown');
        const url = track.url ? escHtml(track.url) : '';
        const thumbnail = track.thumbnail ? escHtml(track.thumbnail) : '';
        const vol = track.volume ?? 50;
        const loopOn = track.loop;
        const statusBadge = isPaused
            ? `<span class="badge bg-warning text-dark">⏸ Paused</span>`
            : `<span class="badge bg-success">▶ Playing</span>`;
        const loopBadge = loopOn
            ? `<span class="badge bg-info text-dark">🔁 Loop ON</span>`
            : `<span class="badge bg-secondary">🔁 Loop OFF</span>`;

        const art = thumbnail
            ? `<img src="${thumbnail}" alt="cover" class="track-art">`
            : `<div class="track-art-placeholder">🎵</div>`;

        const titleHtml = url
            ? `<a href="${url}" target="_blank" rel="noopener">${title}</a>`
            : title;

        const pauseBtn = isPaused
            ? `<button class="btn btn-success btn-control" onclick="ctrl('${guildId}', 'resume')">▶ Resume</button>`
            : `<button class="btn btn-warning btn-control" onclick="ctrl('${guildId}', 'pause')">⏸ Pause</button>`;

        const progHtml = progressBar(track.elapsed, track.duration);

        nowPlayingHtml = `
            <div class="now-playing">
                ${art}
                <div class="track-info">
                    <div class="track-title">${titleHtml}</div>
                    <div class="track-badges">${statusBadge}${loopBadge}</div>
                    ${progHtml}
                    <div class="volume-row">
                        <label>🔊</label>
                        <input type="range" min="0" max="100" value="${vol}" class="form-range"
                            oninput="this.nextElementSibling.textContent=this.value+'%'"
                            onchange="ctrl('${guildId}', 'volume', this.value)">
                        <span class="volume-pct">${vol}%</span>
                    </div>
                </div>
            </div>
            <div class="controls-row">
                ${pauseBtn}
                <button class="btn btn-outline-secondary btn-control" onclick="ctrl('${guildId}', 'skip')">⏭ Skip</button>
                <button class="btn btn-outline-${loopOn ? 'info' : 'secondary'} btn-control" onclick="ctrl('${guildId}', 'loop')">🔁 Loop</button>
                <button class="btn btn-outline-danger btn-control" onclick="banTrack('${guildId}', '${url}')">🚫 Ban Song</button>
            </div>`;
    }

    let queueHtml = '';
    if (queue.length > 0) {
        const rows = queue.slice(0,15).map((s, i) => {
            const t = escHtml(s.title || 'Unknown');
            const dur = fmtDur(s.duration);
            const url = s.original_url ? escHtml(s.original_url) : '';
            const titleEl = url
                ? `<a href="${url}" target="_blank" rel="noopener" class="queue-item-title text-decoration-none">${i+1}. ${t}</a>`
                : `<span class="queue-item-title">${i+1}. ${t}</span>`;
            return `<div class="queue-item">
                        <div style="display:flex;align-items:center;gap:0.4rem;min-width:0;">${titleEl}</div>
                        <div style="display:flex;align-items:center;flex-shrink:0;">
                            ${dur ? `<span class="queue-item-dur">${dur}</span>` : ''}
                            <button class="btn btn-outline-danger btn-sm" style="padding:0.1rem 0.45rem;font-size:0.75rem;border-radius:50%;" onclick="ctrl('${guildId}', 'remove', null, ${i})" title="Remove">×</button>
                        </div>
                    </div>`;
        }).join('');
        const moreNote = queue.length > 15 ? `<div class="queue-empty">…and ${queue.length - 15} more</div>` : '';
        queueHtml = `<div class="queue-section">
            <div class="queue-title">📚 Queue — ${queue.length} song${queue.length !== 1 ? 's' : ''}</div>
            ${rows}${moreNote}
        </div>`;
    } else if (isActive) {
        queueHtml = `<div class="queue-section"><div class="queue-empty">Queue empty — use /play to add more</div></div>`;
    }

    return `
        <div class="music-card" id="guild-card-${guildId}">
            <div class="music-card-header">
                <span>🎮</span>
                <span class="guild-name">${escHtml(guildData.name || guildId)}</span>
            </div>
            <div class="music-body">${nowPlayingHtml}</div>
            ${queueHtml}
        </div>`;
}

async function updateMusicData() {
    try {
        const resp = await fetch('/api/music/data', { cache: 'no-store' });
        if (!resp.ok) return;
        const data = await resp.json();
        const container = document.getElementById('guilds-container');

        if (!data.guilds || Object.keys(data.guilds).length === 0) {
            container.innerHTML = `
                <div class="no-sessions">
                    <div class="icon">🎵</div>
                    <div>No active music sessions</div>
                    <div style="font-size:0.85rem;margin-top:0.5rem;">Use <code>/play</code> in Discord to start playing.</div>
                </div>`;
            return;
        }

        container.innerHTML = Object.entries(data.guilds)
            .map(([id, g]) => renderGuild(id, g))
            .join('');
    } catch(e) {
        console.error('Music data fetch failed', e);
    }
}

async function ctrl(guildId, action, volume = null, index = null) {
    await fetch('/api/music/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guild_id: guildId, action, volume, index })
    });
    await updateMusicData();
}

async function banTrack(guildId, url) {
    if (!url) { alert('No URL for this track.'); return; }
    if (!confirm('Ban this song? It will be skipped and blacklisted.')) return;
    await fetch('/api/music/ban', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
    });
    await updateMusicData();
}

// Start auto-refresh
refreshTimer = setInterval(updateMusicData, REFRESH_MS);
updateMusicData();
</script>
{% endblock %}
