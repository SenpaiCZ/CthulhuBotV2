{% extends 'base.html' %}

{% block title %}Music Dashboard — CthulhuBot{% endblock %}

{% block content %}
<div class="mb-4 d-flex align-items-end justify-content-between">
    <div>
        <div class="label">Atmosphere</div>
        <h2 class="serif" style="fontSize:32px; margin:8px 0 0">Music Dashboard</h2>
    </div>
    <div id="refresh-indicator" class="mono d-none d-sm-block" style="font-size:9px; letter-spacing:0.18em; color:var(--sigil)">RESONANCE: SYNCED</div>
</div>

<div id="guilds-container">
    <div id="loading-spinner" class="text-center py-5">
        <span class="pulse-dot" style="display:inline-block; width:12px; height:12px; background:var(--sigil); border-radius:50%"></span>
        <div class="label mt-3">Summoning audio streams...</div>
    </div>
</div>

<style>
.music-card { 
    background: linear-gradient(160deg, var(--void-1), var(--void-0));
    border: 1px solid var(--hair);
    position: relative;
    margin-bottom: 2rem;
}
.music-card-header { 
    background: rgba(var(--theme-primary-rgb), 0.05); 
    border-bottom: 1px solid var(--hair); 
    padding: 1rem 1.5rem; 
    display: flex; 
    align-items: center; 
    gap: 12px; 
}
.music-card-header .guild-name { 
    font-family: var(--font-serif);
    font-size: 1.25rem;
    color: var(--sigil); 
}
.music-body { padding: 1.5rem; }

/* Now Playing */
.now-playing { display: flex; gap: 1.5rem; align-items: flex-start; }
.track-art { width: 140px; height: 105px; object-fit: cover; border: 1px solid var(--hair-strong); flex-shrink: 0; background: #000; }
.track-art-placeholder { width: 140px; height: 105px; border: 1px solid var(--hair-strong); flex-shrink: 0; background: var(--void-2); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--sigil-deep); }
.track-info { flex: 1; min-width: 0; }
.track-title { font-family: var(--font-serif); font-size: 1.4rem; color: var(--bone); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
.track-title a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: all .2s; }
.track-title a:hover { color: var(--sigil); border-bottom-color: var(--sigil); }
.track-badges { margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; }

/* Progress bar */
.progress-row { margin-top: 12px; }
.progress-bar-wrapper { height: 4px; background: var(--void-4); overflow: hidden; margin-bottom: 8px; position: relative; }
.progress-bar-fill { height: 100%; background: var(--sigil); transition: width 1s linear; box-shadow: 0 0 10px var(--sigil-g); }
.progress-times { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: var(--bone-fade); letter-spacing: 0.1em; }

/* Volume */
.volume-row { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
.volume-row label { font-size: 14px; color: var(--bone-fade); }
.volume-row input[type=range] { flex: 1; accent-color: var(--sigil); }
.volume-pct { font-family: var(--font-mono); font-size: 11px; color: var(--sigil); min-width: 40px; text-align: right; }

/* Controls */
.controls-row { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }

/* Queue */
.queue-section { border-top: 1px solid var(--hair); padding: 1.25rem 1.5rem; background: rgba(0,0,0,0.2); }
.queue-title { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.22em; color: var(--sigil); margin-bottom: 12px; text-transform: uppercase; }
.queue-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--hair); }
.queue-item:last-child { border-bottom: none; }
.queue-item-title { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 400px; color: var(--bone-dim); transition: color .2s; }
.queue-item-title:hover { color: var(--bone); }
.queue-item-dur { font-family: var(--font-mono); font-size: 10px; color: var(--bone-fade); margin: 0 12px; }

@media (max-width: 575.98px) {
    .now-playing { flex-direction: column; align-items: center; text-align: center; }
    .track-art, .track-art-placeholder { width: 100%; height: auto; aspect-ratio: 4/3; }
    .track-info { width: 100%; }
    .controls-row { justify-content: center; }
    .queue-item-title { max-width: 200px; }
}
</style>

<script>
const REFRESH_MS = 3000;
let refreshTimer = null;

function fmtDur(sec) {
    if (!sec || sec <= 0) return null;
    sec = Math.floor(sec);
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function escHtml(t) {
    if (!t) return '';
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function progressBar(elapsed, duration) {
    if (!duration || duration <= 0) return '';
    const pct = Math.min(100, Math.max(0, (elapsed / duration) * 100)).toFixed(1);
    const elStr = fmtDur(elapsed) || '0:00';
    const durStr = fmtDur(duration) || '?:??';
    return `
        <div class="progress-row">
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>
            <div class="progress-times"><span>${elStr}</span><span>${durStr}</span></div>
        </div>`;
}

function renderGuild(guildId, guildData) {
    const track = guildData.current_track;
    const queue = guildData.queue || [];
    const isActive = !!track;
    const isPaused = track?.paused;

    let nowPlayingHtml = `<div class="text-center py-5"><div class="serif-i text-muted" style="font-size:18px">The air is silent...</div><div class="label mt-2">Use /play in Discord to begin the ritual</div></div>`;

    if (isActive) {
        const title = escHtml(track.title || 'Unknown');
        const url = track.url ? escHtml(track.url) : '';
        const thumbnail = track.thumbnail ? escHtml(track.thumbnail) : '';
        const vol = track.volume ?? 50;
        const loopMode = track.loop_mode ?? 'off';
        
        const loopLabel = loopMode === 'track' ? '✧ TRACK' : loopMode === 'queue' ? '◎ QUEUE' : 'OFF';
        const loopClass = loopMode !== 'off' ? 'primary' : '';

        const art = thumbnail
            ? `<img src="${thumbnail}" alt="cover" class="track-art">`
            : `<div class="track-art-placeholder">♪</div>`;

        const titleHtml = url
            ? `<a href="${url}" target="_blank" rel="noopener">${title}</a>`
            : title;

        const pauseBtn = isPaused
            ? `<button class="btn-eld primary" onclick="ctrl('${guildId}', 'resume')">⌁ RESUME</button>`
            : `<button class="btn-eld" onclick="ctrl('${guildId}', 'pause')">⏸ PAUSE</button>`;

        const progHtml = progressBar(track.elapsed, track.duration);

        nowPlayingHtml = `
            <div class="now-playing">
                ${art}
                <div class="track-info">
                    <div class="track-title">${titleHtml}</div>
                    <div class="track-badges">
                        <span class="badge ${isPaused ? 'bg-warning text-dark' : 'bg-success'}" style="font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em; border-radius:0">${isPaused ? 'PAUSED' : 'PLAYING'}</span>
                        <span class="badge bg-secondary" style="font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em; border-radius:0">LOOP: ${loopLabel}</span>
                    </div>
                    ${progHtml}
                    <div class="volume-row">
                        <label>♪</label>
                        <input type="range" min="0" max="100" value="${vol}" 
                            oninput="this.nextElementSibling.textContent=this.value+'%'"
                            onchange="ctrl('${guildId}', 'volume', this.value)">
                        <span class="volume-pct">${vol}%</span>
                    </div>
                </div>
            </div>
            <div class="controls-row">
                ${pauseBtn}
                <button class="btn-eld" onclick="ctrl('${guildId}', 'skip')">⌁ SKIP</button>
                <button class="btn-eld ${loopClass}" onclick="ctrl('${guildId}', 'loop')">◎ LOOP MODE</button>
                <button class="btn-eld rust" onclick="banTrack('${guildId}', '${url}')">⌫ BAN SONG</button>
            </div>`;
    }

    let queueHtml = '';
    if (queue.length > 0) {
        const rows = queue.slice(0,10).map((s, i) => {
            const t = escHtml(s.title || 'Unknown');
            const dur = fmtDur(s.duration);
            const url = s.original_url ? escHtml(s.original_url) : '';
            const titleEl = url
                ? `<a href="${url}" target="_blank" rel="noopener" class="queue-item-title text-decoration-none">${i+1}. ${t}</a>`
                : `<span class="queue-item-title">${i+1}. ${t}</span>`;
            return `<div class="queue-item">
                        <div style="display:flex;align-items:center;gap:0.4rem;min-width:0;">${titleEl}</div>
                        <div style="display:flex;align-items:center;flex-shrink:0;">
                            ${dur ? `<span class="queue-item-dur">${dur}</span>` : ''}
                            <button class="btn-eld rust" style="padding:2px 6px; font-size:8px; border:0" onclick="ctrl('${guildId}', 'remove', null, ${i})">✕</button>
                        </div>
                    </div>`;
        }).join('');
        const moreNote = queue.length > 10 ? `<div class="p-3 text-center label" style="font-size:9px; color:var(--bone-fade)">…AND ${queue.length - 10} MORE TRACKS IN THE VOID</div>` : '';
        queueHtml = `<div class="queue-section">
            <div class="queue-title">Ψ Upcoming Resonance (${queue.length})</div>
            ${rows}${moreNote}
        </div>`;
    }

    return `
        <div class="music-card" id="guild-card-${guildId}">
            <window.Corners/>
            <div class="music-card-header">
                <span class="serif" style="color:var(--sigil); font-size:24px">✶</span>
                <span class="guild-name">${escHtml(guildData.name || guildId)}</span>
            </div>
            <div class="music-body">${nowPlayingHtml}</div>
            ${queueHtml}
        </div>`;
}

async function updateMusicData() {
    try {
        const resp = await fetch('/api/music/data', { cache: 'no-store' });
        if (!resp.ok) return;
        const data = await resp.json();
        const container = document.getElementById('guilds-container');

        if (!data.guilds || Object.keys(data.guilds).length === 0) {
            container.innerHTML = `
                <div class="card-h p-5 text-center">
                    <window.Corners/>
                    <div class="serif-i text-muted" style="font-size:22px">No active music sessions.</div>
                    <div class="label mt-3">The cosmic silence is absolute.</div>
                </div>`;
            return;
        }

        container.innerHTML = Object.entries(data.guilds)
            .map(([id, g]) => renderGuild(id, g))
            .join('');
    } catch(e) {
        console.error('Music data fetch failed', e);
    }
}

async function ctrl(guildId, action, volume = null, index = null) {
    await fetch('/api/music/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guild_id: guildId, action, volume, index })
    });
    await updateMusicData();
}

async function banTrack(guildId, url) {
    if (!url) { alert('No URL for this track.'); return; }
    if (!confirm('Ban this song? It will be skipped and blacklisted.')) return;
    await fetch('/api/music/ban', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
    });
    await updateMusicData();
}

// Start auto-refresh
refreshTimer = setInterval(updateMusicData, REFRESH_MS);
updateMusicData();
</script>
{% endblock %}
