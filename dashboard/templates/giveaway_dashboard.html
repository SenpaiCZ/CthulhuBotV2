{% extends 'base.html' %}

{% block title %}Giveaways — CthulhuBot{% endblock %}

{% block content %}
<div class="mb-4">
    <div class="label">Server Engagement</div>
    <h2 class="serif" style="fontSize:32px; margin:8px 0 0">Giveaways</h2>
</div>

<div class="card-h mb-5">
    <window.Corners/>
    <div class="card-header serif" style="fontSize:18px">
        <span style="color:var(--sigil); margin-right:8px">✦</span> Create New Bounty
    </div>
    <div class="card-body p-4">
        <form id="create-giveaway-form" class="row g-4">
            <div class="col-md-3">
                <label for="guild-select" class="label mb-2" style="display:block">Server</label>
                <select class="form-select bg-dark text-light border-secondary" id="guild-select" required style="font-size:13px">
                    <option value="" selected disabled>Select Server...</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="channel-select" class="label mb-2" style="display:block">Target Channel</label>
                <select class="form-select bg-dark text-light border-secondary" id="channel-select" required disabled style="font-size:13px">
                    <option value="" selected disabled>Select Channel...</option>
                </select>
            </div>
            <div class="col-md-6">
                <label for="prize-input" class="label mb-2" style="display:block">Prize / Bounty</label>
                <input type="text" class="form-control bg-dark text-light border-secondary serif" id="prize-input" placeholder="Ancient Scroll of Knowledge" required style="font-size:16px">
            </div>
            <div class="col-md-3">
                <label for="winners-input" class="label mb-2" style="display:block">Winner Count</label>
                <input type="number" class="form-control bg-dark text-light border-secondary mono" id="winners-input" value="1" min="1" required style="font-size:13px">
            </div>
            <div class="col-md-3">
                <label for="duration-input" class="label mb-2" style="display:block">Duration (Minutes)</label>
                <input type="number" class="form-control bg-dark text-light border-secondary mono" id="duration-input" value="60" min="1" required style="font-size:13px">
            </div>
            <div class="col-md-6 d-flex align-items-end justify-content-end">
                <button type="submit" class="btn-eld primary w-100 w-md-auto" id="create-btn">MANIFEST BOUNTY</button>
            </div>
        </form>
    </div>
</div>

<div class="card-h">
    <window.Corners/>
    <div class="card-header serif" style="fontSize:18px">
        <span style="color:var(--sigil); margin-right:8px">Ψ</span> Active Giveaways
    </div>
    <div class="card-body p-0">
        <div class="responsive-table-container">
            <table class="table mb-0 align-middle" id="giveaways-table">
                <thead class="d-none d-md-table-header-group">
                    <tr>
                        <th class="label ps-4 py-3">Server / Channel</th>
                        <th class="label py-3">Prize</th>
                        <th class="label py-3">Ends (UTC)</th>
                        <th class="label py-3 text-center">Entries</th>
                        <th class="label pe-4 py-3 text-end">Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="loading-spinner" class="text-center py-5">
            <span class="pulse-dot" style="display:inline-block; width:12px; height:12px; background:var(--sigil); border-radius:50%"></span>
        </div>
        <div id="no-data-message" class="text-center py-5 d-none">
            <p class="serif-i text-muted">No active bounties currently manifest.</p>
        </div>
    </div>
</div>

<style>
@media (max-width: 767.98px) {
    .responsive-row { display: block; padding: 1.5rem !important; border-bottom: 1px solid var(--hair-strong); }
    .responsive-row td { display: block; padding: 0 0 1rem 0 !important; border: 0; }
    .responsive-row td:last-child { padding-bottom: 0 !important; margin-top: 0.5rem; }
}
</style>

<script>
let globalData = null;
document.addEventListener('DOMContentLoaded', fetchData);
document.getElementById('guild-select').addEventListener('change', e => updateChannelSelect(e.target.value));
document.getElementById('create-giveaway-form').addEventListener('submit', async e => { e.preventDefault(); await createGiveaway(); });

async function fetchData() {
    try {
        const response = await fetch('/api/giveaway/data');
        const data = await response.json();
        globalData = data;
        populateGuildSelect(data.guilds);
        renderTable(data.giveaways);
        document.getElementById('loading-spinner').classList.add('d-none');
    } catch (e) { console.error(e); }
}

function populateGuildSelect(guilds) {
    const s = document.getElementById('guild-select');
    s.innerHTML = '<option value="" selected disabled>Select Server...</option>';
    guilds.forEach(g => { const o = document.createElement('option'); o.value = g.id; o.textContent = g.name; s.appendChild(o); });
}

function updateChannelSelect(guildId) {
    const s = document.getElementById('channel-select');
    s.innerHTML = '<option value="" selected disabled>Select Channel...</option>';
    s.disabled = true;
    if (!guildId || !globalData) return;
    const g = globalData.guilds.find(x => x.id === guildId);
    if (g?.channels) {
        g.channels.forEach(ch => { const o = document.createElement('option'); o.value = ch.id; o.textContent = ch.name; s.appendChild(o); });
        s.disabled = false;
    }
}

function renderTable(giveaways) {
    const tbody = document.querySelector('#giveaways-table tbody');
    tbody.innerHTML = '';
    const msg = document.getElementById('no-data-message');
    if (!giveaways || giveaways.length === 0) { msg.classList.remove('d-none'); return; }
    msg.classList.add('d-none');
    giveaways.forEach(g => {
        const tr = document.createElement('tr');
        tr.className = 'responsive-row';
        tr.innerHTML = `
            <td class="ps-4 py-3 align-middle">
                <span class="d-md-none label mb-1" style="display:block">Server / Channel</span>
                <div class="serif" style="font-size:15px">${g.guild_name}</div>
                <div class="mono" style="font-size:11px; color:var(--sigil)">#${g.channel_name}</div>
            </td>
            <td class="py-3 align-middle">
                <span class="d-md-none label mb-1" style="display:block">Prize</span>
                <div class="serif" style="font-size:16px; color:var(--bone)">${g.prize}</div>
            </td>
            <td class="py-3 align-middle">
                <span class="d-md-none label mb-1" style="display:block">Ends</span>
                <div class="mono" style="font-size:12px; color:var(--amber)">${g.end_time}</div>
            </td>
            <td class="py-3 align-middle text-md-center">
                <span class="d-md-none label mb-1" style="display:block">Entries</span>
                <span class="badge bg-secondary mono" style="font-size:11px; border-radius:0">${g.entries || 0}</span>
            </td>
            <td class="pe-4 py-3 align-middle text-md-end">
                <button class="btn-eld rust" style="padding: 6px 12px; font-size: 10px" onclick="endGiveaway('${g.guild_id}', '${g.message_id}')">END NOW</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

async function createGiveaway() {
    const g = document.getElementById('guild-select').value;
    const c = document.getElementById('channel-select').value;
    const p = document.getElementById('prize-input').value.trim();
    const w = document.getElementById('winners-input').value;
    const d = document.getElementById('duration-input').value;
    if (!g || !c || !p || !w || !d) return;
    const btn = document.getElementById('create-btn');
    btn.disabled = true; btn.innerText = "MANIFESTING...";
    try {
        const r = await fetch('/api/giveaway/create', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ guild_id:g, channel_id:c, prize:p, winners:parseInt(w), duration:parseInt(d) }) });
        if ((await r.json()).status === 'success') { await fetchData(); document.getElementById('prize-input').value = ''; alert("Bounty manifested!"); }
    } catch (e) { console.error(e); }
    finally { btn.disabled = false; btn.innerText = "MANIFEST BOUNTY"; }
}

async function endGiveaway(g, mid) {
    if (!confirm("End this bounty ritual early?")) return;
    try {
        const r = await fetch('/api/giveaway/end', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ guild_id:g, message_id:mid }) });
        if ((await r.json()).status === 'success') await fetchData();
    } catch (e) { console.error(e); }
}
</script>
{% endblock %}
