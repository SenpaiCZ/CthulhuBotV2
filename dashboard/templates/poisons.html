{% extends 'base.html' %}

{% block title %}Poisons — Grimoire{% endblock %}

{% block content %}
<div id="poisons-root"></div>
{% endblock %}

{% block scripts %}
<script type="text/babel" data-presets="react">
const POISONS_DATA = {{ data | tojson }};
const TYPE_SLUG = '{{ type_slug }}';

{% raw %}
const { useState, useMemo, useEffect } = React;

function PoisonDetail({item, name}) {
  const [imageUrl, setImageUrl] = useState(null);
  
  useEffect(() => {
    if (item && name) {
      fetch(`/api/images/check?type_slug=${TYPE_SLUG}&name=${encodeURIComponent(name)}`)
        .then(r => r.json())
        .then(data => {
          if (data.found) setImageUrl(data.url + '?t=' + new Date().getTime());
          else setImageUrl(null);
        })
        .catch(() => setImageUrl(null));
    }
  }, [item, name]);

  if (!item) {
    return (
      <div style={{display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", height:"100%", textAlign:"center", opacity:0.3, minHeight:400}}>
        <div className="serif" style={{fontSize:28, color:"var(--bone-fade)"}}>Select a toxin from the archives</div>
      </div>
    );
  }

  return (
    <div style={{position:'relative'}}>
      <div style={{display:'flex', gap:40, alignItems:'flex-start', marginBottom:30, flexWrap:'wrap'}}>
        <div style={{flex:1, minWidth:300}}>
          <div className="label" style={{color:"var(--sigil)"}}>Lethal Substances</div>
          <h1 className="serif" style={{fontSize:48, color:"var(--rust)", margin:"8px 0"}}>{name}</h1>
          <div className="serif-i" style={{color:"var(--bone-fade)", fontSize:20, marginBottom:16}}>{item.method || 'Unknown Vector'}</div>
        </div>
        
        {imageUrl && (
          <div style={{maxWidth: 400, flex: "1 0 300px"}}>
            <img src={imageUrl} alt={name} style={{width:'100%', border:'1px solid var(--hair-strong)', boxShadow:'0 10px 30px rgba(0,0,0,0.5)'}} />
          </div>
        )}
      </div>

      <div className="card-h p-4 mb-5" style={{borderLeft: '4px solid var(--rust)', fontSize:'17px', lineHeight:1.6, color:"var(--bone)"}}>
         <window.Corners/>
         {item.description || "The properties of this substance remain obscured in the archives."}
      </div>

      <div className="label mb-3" style={{color:"var(--sigil)"}}>Toxicological Data</div>
      <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(130px, 1fr))", gap:10, marginBottom:40}}>
        <div className="stat-box" style={{border:"1px solid var(--hair-strong)", background:"var(--void-2)", padding:12, textAlign:"center"}}>
          <div style={{fontSize:10, color:"var(--bone-fade)", marginBottom:4, letterSpacing:"0.1em"}}>SPEED</div>
          <div style={{fontSize:18, color:"var(--bone)", fontWeight:600}}>{item.speed || '—'}</div>
        </div>
        <div className="stat-box" style={{border:"1px solid var(--hair-strong)", background:"var(--void-2)", padding:12, textAlign:"center"}}>
          <div style={{fontSize:10, color:"var(--bone-fade)", marginBottom:4, letterSpacing:"0.1em"}}>VECTOR</div>
          <div style={{fontSize:15, color:"var(--bone)", fontWeight:600}}>{item.method || '—'}</div>
        </div>
      </div>

      <div className="row g-4">
          <div className="col-lg-6">
              <div className="label mb-3" style={{color:"var(--sigil)"}}>Resilience Check (CON)</div>
              <div className="card-h p-4 h-100">
                  <window.Corners/>
                  <div style={{fontSize:15, color:"var(--bone-dim)", lineHeight:1.7}}>
                      <div className="label" style={{fontSize:9, color:"var(--sigil)", marginBottom:8}}>ON SUCCESSFUL SAVE</div>
                      {item.damage_on_success || "Standard reduced effects."}
                  </div>
              </div>
          </div>
          <div className="col-lg-6">
              <div className="label mb-3" style={{color:"var(--rust)"}}>Manifested Effects</div>
              <div className="card-h p-4 h-100">
                  <window.Corners/>
                  <div style={{fontSize:15, color:"var(--bone-dim)", lineHeight:1.7}}>
                      <div className="label" style={{fontSize:9, color:"var(--rust)", marginBottom:8}}>ON FAILED SAVE</div>
                      {item.damage_on_fail || "Full biological collapse."}
                  </div>
              </div>
          </div>
      </div>
    </div>
  );
}

function PoisonsApp() {
  const [search, setSearch] = useState('');
  const [selectedName, setSelectedName] = useState(null);
  
  const names = useMemo(() => Object.keys(POISONS_DATA).sort(), []);
  const filtered = useMemo(() => names.filter(n => n.toLowerCase().includes(search.toLowerCase())), [names, search]);

  return (
    <div className="row g-0" style={{margin:"-2rem -3rem", height:"calc(100vh - 72px)"}}>
      <div className="col-md-3 h-100 d-flex flex-column border-end border-secondary" style={{background:"var(--void-1)"}}>
        <div className="p-4 border-bottom border-secondary">
          <div className="label mb-3">Toxin Browser</div>
          <div className="input-group">
             <span className="input-group-text bg-dark border-secondary text-muted" style={{borderRight:0}}>⌕</span>
             <input type="text" className="form-control bg-dark text-light border-secondary" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} style={{fontSize:13, borderLeft:0}} />
          </div>
        </div>
        <div style={{flex:1, overflowY:"auto"}}>
            {filtered.length > 0 ? (
                filtered.map((name, i) => {
                    const isActive = selectedName === name;
                    return (
                        <button key={i} 
                            onClick={() => setSelectedName(name)}
                            className="w-100 border-0 text-start py-3 px-4 transition-all"
                            style={{
                                background: isActive ? "rgba(180,70,60,0.06)" : "transparent",
                                color: isActive ? "var(--rust)" : "var(--bone-dim)",
                                borderLeft: isActive ? "3px solid var(--rust)" : "3px solid transparent",
                                fontSize: 14,
                                borderBottom: "1px solid var(--hair)"
                            }}
                        >
                            {name}
                        </button>
                    );
                })
            ) : (
                <div className="p-5 text-center serif-i text-muted">No toxins found.</div>
            )}
        </div>
      </div>
      <div className="col-md-9 h-100" style={{overflowY:"auto", padding:"40px 60px 100px"}}>
         <PoisonDetail item={selectedName ? POISONS_DATA[selectedName] : null} name={selectedName} />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('poisons-root'));
root.render(<PoisonsApp />);
{% endraw %}
</script>
{% endblock %}
