{% extends 'base.html' %}

{% block title %}Karma Settings — CthulhuBot{% endblock %}

{% block content %}
<div class="mb-4">
    <div class="label">Server Management</div>
    <h2 class="serif" style="fontSize:32px; margin:8px 0 0">Karma System</h2>
</div>

<div class="card-h mb-5">
    <window.Corners/>
    <div class="card-header serif" style="fontSize:18px">
        <span style="color:var(--sigil); margin-right:8px">⌘</span> Select Server
    </div>
    <div class="card-body p-4">
        <select class="form-select bg-dark text-light border-secondary" id="guild-select" style="font-size:14px">
            <option value="" selected disabled>Select Server to Configure...</option>
        </select>
    </div>
</div>

<div id="config-section" class="d-none">
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card-h h-100">
                <window.Corners/>
                <div class="card-header d-flex justify-content-between align-items-center py-3">
                    <div class="serif" style="font-size:18px"><span style="color:var(--sigil); margin-right:8px">⚙</span> Core Mechanics</div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="karma-enabled" onchange="saveBasic()">
                        <label class="label ms-1" style="font-size:8px">ACTIVE</label>
                    </div>
                </div>
                <div class="card-body p-4">
                    <div class="mb-4">
                        <label for="karma-emoji" class="label mb-2" style="display:block">Trigger Sigil (Emoji)</label>
                        <div class="input-group">
                            <input type="text" class="form-control bg-dark text-light border-secondary text-center" id="karma-emoji" placeholder="⭐" style="max-width: 80px">
                            <button class="btn-eld primary" onclick="saveBasic()">SEAL</button>
                        </div>
                    </div>
                    <div class="mb-0">
                        <label for="karma-cooldown" class="label mb-2" style="display:block">Resonance Cooldown (Seconds)</label>
                        <div class="input-group">
                            <input type="number" class="form-control bg-dark text-light border-secondary mono" id="karma-cooldown" min="0" value="0">
                            <button class="btn-eld primary" onclick="saveBasic()">SEAL</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card-h h-100">
                <window.Corners/>
                <div class="card-header serif py-3" style="font-size:18px">
                    <span style="color:var(--sigil); margin-right:8px">⌁</span> Notifications
                </div>
                <div class="card-body p-4">
                    <div class="mb-4">
                        <label for="notif-channel" class="label mb-2" style="display:block">Announcement Channel</label>
                        <select class="form-select bg-dark text-light border-secondary" id="notif-channel" onchange="saveBasic()" style="font-size:13px"></select>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="notif-dm" onchange="saveBasic()">
                        <label class="label ms-2" for="notif-dm" style="font-size:10px">WHISPER TO USER (DM)</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card-h mt-4">
        <window.Corners/>
        <div class="card-header serif py-3" style="font-size:18px">
            <span style="color:var(--sigil); margin-right:8px">✧</span> Rank Architecture (Role Tiers)
        </div>
        <div class="card-body p-4">
            <div id="roles-container" class="row g-3 mb-4"></div>
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="label mb-2">Role to Manifest</label>
                    <select class="form-select bg-dark text-light border-secondary" id="new-role-id" style="font-size:13px"></select>
                </div>
                <div class="col-md-4">
                    <label class="label mb-2">Karma Threshold</label>
                    <input type="number" class="form-control bg-dark text-light border-secondary mono" id="new-role-req" min="1" placeholder="100">
                </div>
                <div class="col-md-3">
                    <button class="btn-eld primary w-100" style="justify-content:center" onclick="addRole()">BIND RANK</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let globalData = null;
let currentGuildId = null;

document.addEventListener('DOMContentLoaded', fetchData);
document.getElementById('guild-select').addEventListener('change', e => loadConfig(e.target.value));

async function fetchData() {
    const r = await fetch('/api/karma/data');
    globalData = await r.json();
    const s = document.getElementById('guild-select');
    s.innerHTML = '<option value="" selected disabled>Select Server...</option>';
    globalData.guilds.forEach(g => { const o = document.createElement('option'); o.value = g.id; o.textContent = g.name; s.appendChild(o); });
}

function loadConfig(guildId) {
    currentGuildId = guildId;
    const g = globalData.guilds.find(x => x.id === guildId);
    if(!g) return;
    document.getElementById('config-section').classList.remove('d-none');
    
    document.getElementById('karma-enabled').checked = g.config.enabled;
    document.getElementById('karma-emoji').value = g.config.emoji || '⭐';
    document.getElementById('karma-cooldown').value = g.config.cooldown || 0;
    document.getElementById('notif-dm').checked = g.config.notify_dm;

    const chS = document.getElementById('notif-channel');
    chS.innerHTML = '<option value="">(None - Disabled)</option>';
    g.channels.forEach(ch => { const o = document.createElement('option'); o.value = ch.id; o.textContent = ch.name; chS.appendChild(o); });
    chS.value = g.config.notification_channel || '';

    const roleS = document.getElementById('new-role-id');
    roleS.innerHTML = '<option value="" disabled selected>Select Role...</option>';
    g.roles.forEach(r => { const o = document.createElement('option'); o.value = r.id; o.textContent = r.name; roleS.appendChild(o); });

    renderRoles(g.config.roles, g.roles);
}

function renderRoles(karmaRoles, allRoles) {
    const container = document.getElementById('roles-container');
    container.innerHTML = '';
    const sorted = Object.entries(karmaRoles).sort((a,b) => a[1]-b[1]);
    sorted.forEach(([rid, req]) => {
        const rName = allRoles.find(x => x.id === rid)?.name || 'Unknown Role';
        const col = document.createElement('div');
        col.className = 'col-md-4';
        col.innerHTML = `
            <div class="card-h p-3 d-flex justify-content-between align-items-center" style="background:var(--void-2)">
                <window.Corners/>
                <div>
                    <div class="serif" style="font-size:15px; color:var(--sigil)">${rName}</div>
                    <div class="mono" style="font-size:10px; color:var(--bone-fade)">REQ: ${req}</div>
                </div>
                <button class="btn-eld rust" style="padding:4px 8px" onclick="removeRole('${rid}')">✕</button>
            </div>
        `;
        container.appendChild(col);
    });
}

async function saveBasic() {
    const payload = {
        guild_id: currentGuildId,
        enabled: document.getElementById('karma-enabled').checked,
        emoji: document.getElementById('karma-emoji').value,
        cooldown: parseInt(document.getElementById('karma-cooldown').value),
        notification_channel: document.getElementById('notif-channel').value || null,
        notify_dm: document.getElementById('notif-dm').checked
    };
    await fetch('/api/karma/save_config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
}

async function addRole() {
    const rid = document.getElementById('new-role-id').value;
    const req = document.getElementById('new-role-req').value;
    if(!rid || !req) return;
    const r = await fetch('/api/karma/role/add', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({guild_id:currentGuildId, role_id:rid, requirement:parseInt(req)}) });
    if((await r.json()).status === 'success') { await fetchData(); loadConfig(currentGuildId); }
}

async function removeRole(rid) {
    if(!confirm("Banish this role rank?")) return;
    const r = await fetch('/api/karma/role/remove', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({guild_id:currentGuildId, role_id:rid}) });
    if((await r.json()).status === 'success') { await fetchData(); loadConfig(currentGuildId); }
}
</script>
{% endblock %}
