<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --void-0: #05070a;
    --void-1: #0a0d11;
    --void-2: #10141a;
    --void-3: #161b23;
    --void-4: #1e242e;
    --hair: rgba(190,210,195,0.08);
    --hair-strong: rgba(190,210,195,0.15);
    --bone: oklch(0.93 0.012 75);
    --bone-dim: oklch(0.78 0.015 75);
    --bone-fade: oklch(0.52 0.015 75);
    --sigil: oklch(0.78 0.16 152);
    --sigil-deep: oklch(0.52 0.14 152);
    --sigil-glow: oklch(0.85 0.18 152 / 0.35);
    --sigil-g: oklch(0.85 0.18 152 / 0.6);
    --rust: oklch(0.62 0.16 28);
    --rust-deep: oklch(0.45 0.15 28);
    --amber: oklch(0.78 0.13 75);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--void-0);color:var(--bone)}
  body{
    font-family:"Inter Tight",system-ui,sans-serif;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .serif{font-family:"IM Fell English SC","IM Fell English",serif;letter-spacing:0.02em}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
  @keyframes flicker{0%,92%,100%{opacity:1}93%{opacity:0.35}94%{opacity:1}96%{opacity:0.65}97%{opacity:1}}
  .flicker{animation:flicker 7s infinite}

  #root{display:flex;height:100vh;overflow:hidden}
  header{flex-shrink:0;display:flex;align-items:center;gap:16px;padding:16px 32px;border-bottom:1px solid var(--hair-strong);background:linear-gradient(180deg,var(--void-0),transparent);position:sticky;top:0;z-index:10;backdrop-filter:blur(6px)}
  main{flex:1;overflow-y:auto;padding:28px 40px 80px;display:flex;flex-direction:column;gap:28px}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
  .card{border:1px solid var(--hair-strong);background:linear-gradient(160deg,var(--void-1),var(--void-0));padding:20px;transition:all 0.2s;cursor:pointer}
  .card:hover{border-color:var(--sigil);box-shadow:0 4px 16px rgba(0,0,0,0.3),inset 0 0 20px var(--sigil-glow);transform:translateY(-2px)}
  .card-title{color:var(--sigil);font-weight:600;margin-bottom:8px;font-size:15px}
  .card-desc{color:var(--bone-fade);font-size:13px;margin-bottom:12px}
  .card a{display:inline-block;padding:7px 12px;border:1px solid var(--hair-strong);background:transparent;color:var(--bone);text-decoration:none;font-size:11px;font-family:"IBM Plex Mono",monospace;letter-spacing:0.08em;transition:all 0.2s}
  .card a:hover{border-color:var(--sigil);color:var(--sigil);box-shadow:inset 0 0 20px var(--sigil-glow)}

  .section-title{color:var(--bone);font-size:18px;margin:20px 0 12px 0;padding-bottom:12px;border-bottom:1px solid var(--hair-strong)}
  .glyph{color:var(--sigil);margin-right:8px;opacity:0.7}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='sidebar.jsx') }}"></script>
<script type="text/babel" data-presets="react">
{% raw %}
const AppSidebar = () => { const C = window.AppSidebar; return C ? React.createElement(C) : null; };

function TopBar() {
  const [t, setT] = React.useState(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const p = n => String(n).padStart(2, "0");
  return (
    <header>
      <div className="mono flicker" style={{fontSize:10,letterSpacing:"0.22em",color:"var(--sigil)"}}>
        {`${p(t.getHours())}:${p(t.getMinutes())}:${p(t.getSeconds())}`}
      </div>
      <span style={{width:1,height:14,background:"var(--hair-strong)"}}/>
      <div className="mono" style={{fontSize:10,letterSpacing:"0.18em",color:"var(--bone-fade)"}}>
        {t.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"}).toUpperCase()}
      </div>
      <div style={{flex:1}}/>
      <a href="/" style={{padding:"7px 12px",border:"1px solid var(--hair-strong)",background:"transparent",color:"var(--bone)",textDecoration:"none",fontSize:11,fontFamily:"IBM Plex Mono",letterSpacing:"0.08em",cursor:"pointer"}}>Home</a>
      <a href="/logout" style={{padding:"7px 12px",border:"1px solid var(--rust-deep)",background:"transparent",color:"var(--rust)",textDecoration:"none",fontSize:11,fontFamily:"IBM Plex Mono",letterSpacing:"0.08em",cursor:"pointer"}}>Logout</a>
    </header>
  );
}

function CardLink({title, desc, href}) {
  return (
    <div className="card">
      <div className="card-title">{title}</div>
      <div className="card-desc">{desc}</div>
      <a href={href}>Open →</a>
    </div>
  );
}

function Section({title, marker, children}) {
  return (
    <div>
      <div className="section-title"><span className="glyph">{marker}</span>{title}</div>
      <div className="card-grid">{children}</div>
    </div>
  );
}

function App() {
  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      <AppSidebar/>
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
        <TopBar/>
        <main>
          <h1 className="serif" style={{fontSize:32,marginBottom:8}}>Admin Dashboard</h1>

          <Section title="Keeper Tools" marker="◈">
            <CardLink title="Active Characters" desc="View and manage active investigators." href="/characters"/>
            <CardLink title="Retired Characters" desc="View the graveyard of retired investigators." href="/retired"/>
            <CardLink title="Polls" desc="Create and manage polls." href="/admin/polls"/>
            <CardLink title="Reminders" desc="Manage reminders." href="/admin/reminders"/>
            <CardLink title="Dashboard Design" desc="Change the visual theme." href="/admin/design"/>
          </Section>

          <Section title="Grimoire" marker="Ψ">
            <CardLink title="Monsters" desc="View the Grimoire of Monsters." href="/monsters"/>
            <CardLink title="Deities" desc="View the Pantheon of Deities." href="/deities"/>
            <CardLink title="Spells" desc="Browse the arcane Spells." href="/spells"/>
          </Section>

          <Section title="Pulp Cthulhu" marker="✦">
            <CardLink title="Archetypes" desc="Browse Pulp Cthulhu Archetypes." href="/archetypes"/>
            <CardLink title="Pulp Talents" desc="View Pulp Talents by category." href="/pulp_talents"/>
            <CardLink title="Insane Talents" desc="View Insane Talents." href="/insane_talents"/>
          </Section>

          <Section title="Reference" marker="⚒">
            <CardLink title="Occupations" desc="Browse Occupations." href="/occupations"/>
            <CardLink title="Skills" desc="Skill descriptions and base values." href="/skills"/>
            <CardLink title="Inventions" desc="Timeline of Inventions." href="/inventions"/>
            <CardLink title="Years Timeline" desc="Timeline of historical events." href="/years"/>
            <CardLink title="Manias" desc="List of Manias." href="/manias"/>
            <CardLink title="Phobias" desc="List of Phobias." href="/phobias"/>
            <CardLink title="Weapons" desc="View the Armory of Weapons." href="/weapons"/>
            <CardLink title="Poisons" desc="List of Poisons." href="/poisons"/>
          </Section>

          <Section title="Audio" marker="♪">
            <CardLink title="Soundboard" desc="Play audio files in voice channels." href="/admin/soundboard"/>
            <CardLink title="Music Bot" desc="Manage music queue and bans." href="/admin/music"/>
          </Section>

          <Section title="Server Administration" marker="⚙">
            <CardLink title="Auto Rooms" desc="Configure automatic voice channel creation." href="/admin/autorooms"/>
            <CardLink title="Auto Deleter" desc="Manage auto-deletion rules and bulk delete." href="/admin/deleter"/>
            <CardLink title="Reaction Roles" desc="Assign roles via message reactions." href="/admin/reactionroles"/>
            <CardLink title="Karma System" desc="Configure reaction channel and emojis." href="/admin/karma"/>
            <CardLink title="Gamer Roles" desc="Configure automatic game roles." href="/admin/gameroles"/>
            <CardLink title="Giveaways" desc="Manage server giveaways." href="/admin/giveaway"/>
          </Section>

          <Section title="Information" marker="⌁">
            <CardLink title="RSS Feeds" desc="Manage RSS subscriptions and channels." href="/admin/rss"/>
            <CardLink title="Pokemon GO" desc="Manage events and notifications." href="/admin/pokemon"/>
          </Section>

          <Section title="Server" marker="◎">
            <CardLink title="Bot Configuration" desc="Manage bot status and server prefixes." href="/admin/bot_config"/>
            <CardLink title="Data Files" desc="Manage raw data files." href="/admin/browse/data"/>
            <CardLink title="Info Data" desc="Manage game data files." href="/admin/browse/infodata"/>
            <CardLink title="Backup System" desc="Manage automated backups." href="/admin/backup"/>
          </Section>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
{% endraw %}
</script>
</body>
</html>
