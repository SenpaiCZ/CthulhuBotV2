{% extends 'base.html' %}

{% block title %}Admin Dashboard — CthulhuBot{% endblock %}

{% block content %}
<div id="admin-root"></div>
{% endblock %}

{% block scripts %}
<script type="text/babel" data-presets="react">
{% raw %}
const { useState, useEffect } = React;

/* ─── Admin Tiles data ─────────────────────────────── */
const adminTiles = [
  { group: "Keeper Tools", label: "Investigator & Campaign", items: [
    { k:"Active Characters", g:"✶", desc:"Manage active investigator sheets and stats.", href:"/characters"},
    { k:"Retired Characters", g:"†", desc:"Browse the archive of dead or retired investigators.", href:"/retired"},
    { k:"Polls", g:"◈", desc:"Create and manage interactive server polls.", href:"/admin/polls"},
    { k:"Reminders", g:"◷", desc:"Manage scheduled server reminders.", href:"/admin/reminders"},
    { k:"Dashboard Design", g:"🎨", desc:"Visual theme and font configuration.", href:"/admin/design"},
    { k:"Game Settings", g:"⚙", desc:"Luck threshold and gameplay configuration.", href:"/admin/game_settings"},
  ]},
  { group: "Grimoire", label: "Reference Library", items: [
    { k:"Grimoire Hub", g:"📜", desc:"Main library dashboard and search.", href:"/grimoire"},
    { k:"Monsters", g:"Ψ", desc:"The Grimoire of Cthulhu Mythos monsters.", href:"/monsters"},
    { k:"Deities", g:"☉", desc:"Great Old Ones, Outer Gods and Elder Gods.", href:"/deities"},
    { k:"Spells", g:"✷", desc:"Arcane spells, rituals and enchantments.", href:"/spells"},
    { k:"Occupations", g:"⚒", desc:"Investigator professions 1890–1930.", href:"/occupations"},
    { k:"Skills", g:"◉", desc:"Investigator skills and base values.", href:"/skills"},
    { k:"Weapons", g:"†", desc:"Firearms, melee and improvised weapons.", href:"/weapons"},
    { k:"Poisons", g:"✡", desc:"Lethal substances and their effects.", href:"/poisons"},
  ]},
  { group: "Pulp Cthulhu", label: "Pulp & Advanced Rules", items: [
    { k:"Archetypes",  g:"✶", desc:"Pulp Cthulhu hero archetypes.", href:"/archetypes"},
    { k:"Pulp Talents", g:"✦", desc:"Heroic talents for Pulp investigators.", href:"/pulp_talents"},
    { k:"Insane Talents", g:"☣", desc:"Dark gifts acquired through madness.", href:"/insane_talents"},
  ]},
  { group: "Audio & Media", label: "Voice Channel Controls", items: [
    { k:"Soundboard", g:"◐", desc:"Play audio clips and manage library.", href:"/admin/soundboard"},
    { k:"Music Bot", g:"♪", desc:"Music queue, bans and configuration.", href:"/admin/music"},
  ]},
  { group: "Server Operations", label: "Automation & Roles", items: [
    { k:"Auto Rooms", g:"⌘", desc:"Automatic voice channel creation rules.", href:"/admin/autorooms"},
    { k:"Auto Deleter", g:"⌫", desc:"Message auto-deletion and purge tools.", href:"/admin/deleter"},
    { k:"Reaction Roles", g:"✧", desc:"Self-assignable roles via reactions.", href:"/admin/reactionroles"},
    { k:"Karma System", g:"☥", desc:"Reaction-based reputation and leaderboard.", href:"/admin/karma"},
    { k:"Gamer Roles", g:"⚔", desc:"Automatic game-based role assignment.", href:"/admin/gameroles"},
    { k:"Giveaways", g:"✦", desc:"Create and manage server giveaways.", href:"/admin/giveaway"},
    { k:"Enrollment", g:"✎", desc:"Role enrollment wizard configuration.", href:"/admin/enroll"},
  ]},
  { group: "System", label: "Bot & Infrastructure", items: [
    { k:"Bot Configuration", g:"◎", desc:"Status, prefix and core bot settings.", href:"/admin/bot_config"},
    { k:"Backup System", g:"⧗", desc:"Manage automated and manual backups.", href:"/admin/backup"},
    { k:"Data Files", g:"⌗", desc:"Raw JSON data file editor.", href:"/admin/browse/data"},
    { k:"Info Data", g:"🗇", desc:"Static game data file editor.", href:"/admin/browse/infodata"},
  ]}
];

const AdminTile = ({k, g, desc, href}) => (
  <a href={href}
    className="admin-tile"
    style={{
      background:"var(--void-1)", padding:"24px 20px 20px", display:"block", 
      transition:"all .2s", position:"relative", 
      borderRight:"1px solid var(--hair)", borderBottom:"1px solid var(--hair)",
      textDecoration:"none"
    }}>
    <div style={{marginBottom:14}}>
      <span className="serif" style={{fontSize:24, color:"var(--sigil)", lineHeight:1}}>{g}</span>
    </div>
    <div className="serif" style={{fontSize:18, marginBottom:8, color:"var(--bone)"}}>{k}</div>
    <div style={{fontSize:12, color:"var(--bone-fade)", lineHeight:1.6}}>{desc}</div>
    
    <style>{`
      .admin-tile:hover { background: var(--void-2) !important; }
      .admin-tile:hover .serif { color: var(--sigil-glow) !important; text-shadow: 0 0 10px var(--sigil-g); }
    `}</style>
  </a>
);

const Divider = ({label}) => (
  <div style={{display:"flex", alignItems:"center", gap:12, margin:"32px 0 16px"}}>
    <span className="label" style={{color:"var(--sigil)"}}>✶</span>
    <span className="label">{label}</span>
    <span style={{flex:1, height:1, background:"linear-gradient(90deg, var(--hair-strong), transparent)"}}/>
  </div>
);

function AdminDashboard() {
  const [vitals, setVitals] = useState(null);

  useEffect(() => {
    const poll = async () => {
      try {
        const r = await fetch('/api/status', {cache:"no-store"});
        const d = await r.json();
        setVitals(d);
      } catch {}
    };
    poll();
    const id = setInterval(poll, 5000);
    return () => clearInterval(id);
  }, []);

  return (
    <div style={{display:"flex", flexDirection:"column", gap:28}}>
      <div style={{display:"flex", alignItems:"flex-end", justifyContent:"space-between", marginBottom:4, gap:20, flexWrap:"wrap"}}>
        <div>
          <div className="label">System Administration</div>
          <h1 className="serif" style={{fontSize:48, margin:"8px 0 0"}}>Admin Console</h1>
        </div>
        
        {vitals && (
          <div className="card-h d-none d-lg-flex" style={{padding:"12px 20px", gap:20}}>
            <window.Corners/>
            <div style={{display:"flex", alignItems:"baseline", gap:8}}>
                <span className="label" style={{fontSize:9}}>Status</span>
                <span className="mono" style={{fontSize:11, color: vitals.ready ? "var(--sigil)" : "var(--amber)", display:"flex", alignItems:"center", gap:5}}>
                    <span className="pulse-dot" style={{width:6, height:6, borderRadius:"50%", background: vitals.ready ? "var(--sigil)" : "var(--amber)"}}/>
                    {vitals.ready ? "ONLINE" : "STARTING"}
                </span>
            </div>
            <div style={{display:"flex", alignItems:"baseline", gap:8}}>
                <span className="label" style={{fontSize:9}}>Uptime</span>
                <span className="mono" style={{fontSize:11}}>{vitals.uptime || "—"}</span>
            </div>
          </div>
        )}
      </div>

      {adminTiles.map(section => (
        <div key={section.group}>
          <Divider label={section.label}/>
          <div style={{
            display:"grid", 
            gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", 
            gap:1, background:"var(--hair)", 
            borderLeft:"1px solid var(--hair)", borderTop:"1px solid var(--hair)"
          }}>
            {section.items.map(item => (
              <AdminTile key={item.k} {...item} />
            ))}
          </div>
        </div>
      ))}
      
      <div className="card-h p-4 mt-4" style={{textAlign:"center"}}>
          <window.Corners/>
          <div className="label mb-3">System Actions</div>
          <div style={{display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap"}}>
              <button className="btn-eld" onClick={async () => {
                  try {
                      const r = await fetch('/api/admin/sync_guild', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
                      const d = await r.json();
                      alert(d.message || 'Synced');
                  } catch(e) { alert('Error: ' + e); }
              }}>↻ SYNC SLASH COMMANDS</button>
              
              <button className="btn-eld rust" onClick={() => window.confirmUpdate()}>↑ UPDATE FROM GITHUB</button>
          </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('admin-root'));
root.render(<AdminDashboard />);
{% endraw %}
</script>
{% endblock %}
