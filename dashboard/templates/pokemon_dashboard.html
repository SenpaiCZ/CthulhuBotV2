{% extends 'base.html' %}

{% block title %}Pokemon Go Tracker — CthulhuBot{% endblock %}

{% block content %}
<div class="mb-4">
    <div class="label">Extra-Dimensional Entities</div>
    <h2 class="serif" style="fontSize:32px; margin:8px 0 0">Pokemon GO Tracker</h2>
</div>

<div class="card-h mb-5">
    <window.Corners/>
    <div class="card-header serif" style="fontSize:18px">
        <span style="color:var(--sigil); margin-right:8px">✚</span> Add New Portal (Tracker)
    </div>
    <div class="card-body p-4">
        <form id="add-pogo-form" class="row g-4">
            <div class="col-md-4">
                <label for="guild-select" class="label mb-2" style="display:block">Server</label>
                <select class="form-select bg-dark text-light border-secondary" id="guild-select" required style="font-size:13px">
                    <option value="" selected disabled>Select Server...</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="channel-select" class="label mb-2" style="display:block">Target Channel</label>
                <select class="form-select bg-dark text-light border-secondary" id="channel-select" required disabled style="font-size:13px">
                    <option value="" selected disabled>Select Channel...</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn-eld primary w-100" id="add-btn" style="justify-content:center">OPEN PORTAL</button>
            </div>
        </form>
    </div>
</div>

<div class="card-h">
    <window.Corners/>
    <div class="card-header serif" style="fontSize:18px">
        <span style="color:var(--sigil); margin-right:8px">⌘</span> Active Dimensional Anchors
    </div>
    <div class="card-body p-0">
        <div class="responsive-table-container">
            <table class="table mb-0 align-middle" id="pogo-table">
                <thead class="d-none d-md-table-header-group">
                    <tr>
                        <th class="label ps-4 py-3">Server</th>
                        <th class="label py-3">Channel</th>
                        <th class="label py-3">Status</th>
                        <th class="label pe-4 py-3 text-end">Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="loading-spinner" class="text-center py-5">
            <span class="pulse-dot" style="display:inline-block; width:12px; height:12px; background:var(--sigil); border-radius:50%"></span>
        </div>
        <div id="no-data-message" class="text-center py-5 d-none">
            <p class="serif-i text-muted">No dimensional trackers active.</p>
        </div>
    </div>
</div>

<style>
@media (max-width: 767.98px) {
    .responsive-row { display: block; padding: 1.5rem !important; border-bottom: 1px solid var(--hair-strong); }
    .responsive-row td { display: block; padding: 0 0 1rem 0 !important; border: 0; }
    .responsive-row td:last-child { padding-bottom: 0 !important; margin-top: 0.5rem; }
}
</style>

<script>
let globalData = null;
document.addEventListener('DOMContentLoaded', () => {
    fetchData();
    document.getElementById('guild-select').addEventListener('change', e => updateChannelSelect(e.target.value));
    document.getElementById('add-pogo-form').addEventListener('submit', async e => { e.preventDefault(); await addTracker(); });
});

async function fetchData() {
    try {
        const response = await fetch('/api/pogo/data');
        const data = await response.json();
        globalData = data;
        populateGuildSelect(data.guilds);
        renderTable(data.trackers);
        document.getElementById('loading-spinner').classList.add('d-none');
    } catch (e) { console.error(e); }
}

function populateGuildSelect(guilds) {
    const s = document.getElementById('guild-select');
    s.innerHTML = '<option value="" selected disabled>Select Server...</option>';
    guilds.forEach(g => { const o = document.createElement('option'); o.value = g.id; o.textContent = g.name; s.appendChild(o); });
}

function updateChannelSelect(guildId) {
    const s = document.getElementById('channel-select');
    s.innerHTML = '<option value="" selected disabled>Select Channel...</option>';
    s.disabled = true;
    if (!guildId || !globalData) return;
    const g = globalData.guilds.find(x => x.id === guildId);
    if (g?.channels) {
        g.channels.forEach(ch => { const o = document.createElement('option'); o.value = ch.id; o.textContent = ch.name; s.appendChild(o); });
        s.disabled = false;
    }
}

function renderTable(trackers) {
    const tbody = document.querySelector('#pogo-table tbody');
    tbody.innerHTML = '';
    const msg = document.getElementById('no-data-message');
    if (!trackers || trackers.length === 0) { msg.classList.remove('d-none'); return; }
    msg.classList.add('d-none');
    trackers.forEach(t => {
        const tr = document.createElement('tr');
        tr.className = 'responsive-row';
        tr.innerHTML = `
            <td class="ps-4 py-3 align-middle">
                <span class="d-md-none label mb-1" style="display:block">Server</span>
                <div class="serif" style="font-size:15px">${t.guild_name}</div>
            </td>
            <td class="py-3 align-middle">
                <span class="d-md-none label mb-1" style="display:block">Channel</span>
                <div class="mono" style="font-size:12px; color:var(--sigil)">#${t.channel_name}</div>
            </td>
            <td class="py-3 align-middle">
                <span class="d-md-none label mb-1" style="display:block">Status</span>
                <span class="badge bg-success mono" style="font-size:9px; border-radius:0">ACTIVE</span>
            </td>
            <td class="pe-4 py-3 align-middle text-md-end">
                <button class="btn-eld rust" style="padding: 6px 12px; font-size: 10px" onclick="deleteTracker('${t.guild_id}', '${t.channel_id}')">CLOSE PORTAL</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

async function addTracker() {
    const g = document.getElementById('guild-select').value;
    const c = document.getElementById('channel-select').value;
    if (!g || !c) return;
    const btn = document.getElementById('add-btn');
    btn.disabled = true; btn.innerText = "OPENING...";
    try {
        const r = await fetch('/api/pogo/add', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ guild_id: g, channel_id: c }) });
        if ((await r.json()).status === 'success') { await fetchData(); alert("Portal opened!"); }
    } catch (e) { console.error(e); }
    finally { btn.disabled = false; btn.innerText = "OPEN PORTAL"; }
}

async function deleteTracker(g, c) {
    if (!confirm("Seal this dimensional portal?")) return;
    try {
        const r = await fetch('/api/pogo/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ guild_id: g, channel_id: c }) });
        if ((await r.json()).status === 'success') await fetchData();
    } catch (e) { console.error(e); }
}
</script>
{% endblock %}
