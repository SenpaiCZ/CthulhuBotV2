<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-theme="{{ dashboard_theme|default('cthulhu') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram — CthulhuBot</title>
    <link href="{{ url_for('static', filename='css/themes.css') }}" rel="stylesheet">
    {% include 'includes/font_styles.html' %}
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            font-family: 'Special Elite', 'Courier New', monospace;
            -webkit-font-smoothing: antialiased;
        }

        .telegram-container {
            background-color: #f4e4bc;
            background: #f4e4bc url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            color: #322f28;
            width: 850px;
            max-width: 100%;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.1);
            border: 1px solid #d4c49c;
            position: relative;
        }

        .header-row {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #333; padding-bottom: 15px; margin-bottom: 30px;
        }

        .logo { font-size: 3rem; font-weight: 900; letter-spacing: 5px; opacity: 0.9; }

        .meta-info { display: flex; gap: 24px; font-size: 1rem; }
        .meta-box { border: 1px solid #555; padding: 8px 15px; background: rgba(0,0,0,0.03); }
        .meta-label { font-size: 0.7rem; display: block; text-transform: uppercase; font-weight: bold; opacity: 0.7; margin-bottom: 4px; }

        .recipient-section { margin-bottom: 40px; font-size: 1.4rem; border-left: 5px solid #333; padding-left: 20px; }

        .body-text {
            font-size: 1.6rem; line-height: 1.5; text-transform: uppercase; margin-bottom: 60px;
            min-height: 200px; position: relative;
        }

        /* Simulation of teletype tape strips */
        .body-text span { background: rgba(255,255,255,0.4); padding: 2px 8px; box-shadow: 1px 1px 3px rgba(0,0,0,0.1); display: inline-block; margin-bottom: 4px; }

        .sender-section { text-align: right; font-size: 1.4rem; border-top: 1px dashed #777; padding-top: 15px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="telegram-container">
        <div class="header-row">
            <div class="logo">TELEGRAM</div>
            <div class="meta-info">
                <div class="meta-box">
                    <span class="meta-label">Origin Station</span>
                    {{ origin|upper }}
                </div>
                <div class="meta-box">
                    <span class="meta-label">Resonance Date</span>
                    {{ date|upper }}
                </div>
            </div>
        </div>

        <div class="recipient-section">
            TO: {{ recipient|upper }}
        </div>

        <div class="body-text">
            <span>{{ body|upper }}</span>
        </div>

        <div class="sender-section">
            FROM: {{ sender|upper }}
        </div>
    </div>
</body>
</html>
