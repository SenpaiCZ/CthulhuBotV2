<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-theme="{{ dashboard_theme|default('cthulhu') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter — CthulhuBot</title>
    <link href="{{ url_for('static', filename='css/themes.css') }}" rel="stylesheet">
    {% include 'includes/font_styles.html' %}
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Nanum+Myeongjo&display=swap');

        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            -webkit-font-smoothing: antialiased;
        }

        .letter-container {
            background-color: #fdfbf7;
            background: #fdfbf7 url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.12'/%3E%3C/svg%3E");
            color: #1a1a1a;
            width: 750px;
            max-width: 100%;
            padding: 60px 80px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.1);
            font-family: 'Nanum Myeongjo', serif;
            font-size: 1.25rem;
            line-height: 1.7;
            position: relative;
        }

        /* Subtle aging effect */
        .letter-container::after {
            content: ""; position: absolute; inset: 0; pointer-events: none;
            background: linear-gradient(135deg, rgba(210,180,140,0.1), transparent 40%, rgba(139,69,19,0.05));
        }

        .date { text-align: right; margin-bottom: 40px; font-style: italic; opacity: 0.8; }
        .salutation { margin-bottom: 24px; font-weight: bold; }
        .body-text { text-align: justify; margin-bottom: 50px; white-space: pre-wrap; }
        .signature { text-align: right; font-family: 'Dancing Script', cursive; font-size: 2rem; color: #2a2a2a; }
    </style>
</head>
<body>
    <div class="letter-container">
        <div class="date">{{ date }}</div>
        <div class="salutation">{{ salutation }}</div>
        <div class="body-text">{{ body }}</div>
        <div class="signature">{{ signature }}</div>
    </div>
</body>
</html>
